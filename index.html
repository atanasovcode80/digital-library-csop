<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дигитална библиотека на ЦСОП "Леда Милева"</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800;900&display=swap');
        body { font-family: 'Manrope', sans-serif; background-color: #F8FAFC; color: #0F172A; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        
        /* Анимации */
        .animate-fade-in { animation: fadeIn 0.4s ease-out; }
        .animate-slide-up { animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        .animate-pop { animation: popIn 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes popIn { 
            0% { opacity: 0; transform: scale(0.95); } 
            100% { opacity: 1; transform: scale(1); } 
        }

        /* Стъклен ефект */
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- Икони (Inline SVG за стабилност) ---
        const Icons = {
            Search: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>,
            Filter: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="4" y1="21" x2="4" y2="14"></line><line x1="4" y1="10" x2="4" y2="3"></line><line x1="12" y1="21" x2="12" y2="12"></line><line x1="12" y1="8" x2="12" y2="3"></line><line x1="20" y1="21" x2="20" y2="16"></line><line x1="20" y1="12" x2="20" y2="3"></line><line x1="1" y1="14" x2="7" y2="14"></line><line x1="9" y1="8" x2="15" y2="8"></line><line x1="17" y1="16" x2="23" y2="16"></line></svg>,
            Lock: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>,
            Unlock: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 9.9-1"></path></svg>,
            Plus: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>,
            X: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>,
            FileText: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>,
            Link: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>,
            Edit: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>,
            Trash: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>,
            Check: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
        };

        // --- Данни ---
        const initialResources = [
            { id: 1, title: "Интерактивна игра: Букви и Звуци", category: "Български език", type: "link", format: "game", grade: "1-4", url: "#" },
            { id: 2, title: "Работен лист: Събиране до 10", category: "Математика", type: "file", format: "pdf", grade: "1-4", url: "#" },
            { id: 3, title: "Видео урок: Слънчевата система", category: "Човекът и природата", type: "link", format: "video", grade: "5-7", url: "#" },
            { id: 4, title: "Презентация: Васил Левски", category: "Човекът и обществото", type: "file", format: "ppt", grade: "5-7", url: "#" },
            { id: 5, title: "Упражнение: Части на речта", category: "Български език", type: "file", format: "docx", grade: "5-7", url: "#" },
            { id: 6, title: "Развиваща игра: Цветове и форми", category: "Специализирани", type: "link", format: "game", grade: "1-4", url: "#" }
        ];

        const CATEGORIES = ["Всички", "Български език", "Математика", "Човекът и природата", "Човекът и обществото", "Специализирани"];
        
        const FORMAT_LABELS = { pdf: "PDF Документ", docx: "Word Документ", ppt: "Презентация", video: "Видео Урок", game: "Интерактивна Игра" };
        const FORMAT_COLORS = { 
            pdf: "bg-red-100 text-red-600", 
            docx: "bg-blue-100 text-blue-600", 
            ppt: "bg-orange-100 text-orange-600", 
            video: "bg-purple-100 text-purple-600", 
            game: "bg-teal-100 text-teal-600" 
        };

        function App() {
            // --- Състояния (State) ---
            const [resources, setResources] = useState(initialResources);
            const [searchQuery, setSearchQuery] = useState("");
            const [selectedCategory, setSelectedCategory] = useState("Всички");
            
            // Фиктри
            const [showFilters, setShowFilters] = useState(false);
            const [filters, setFilters] = useState({
                grades: { "1-4": false, "5-7": false, "8-10": false, "11-12": false },
                formats: { pdf: false, docx: false, ppt: false, video: false, game: false }
            });

            // Администрация
            const [isAdmin, setIsAdmin] = useState(false);
            const [showLoginModal, setShowLoginModal] = useState(false);
            const [loginPassword, setLoginPassword] = useState("");
            const [loginError, setLoginError] = useState("");

            // CRUD Ресурси
            const [showResourceModal, setShowResourceModal] = useState(false);
            const [editingResource, setEditingResource] = useState(null);
            const [formData, setFormData] = useState({
                title: "", category: "Български език", type: "file", format: "pdf", grade: "1-4", url: ""
            });

            // --- Логика за филтриране ---
            const filteredResources = useMemo(() => {
                return resources.filter(res => {
                    const matchesSearch = res.title.toLowerCase().includes(searchQuery.toLowerCase());
                    const matchesCategory = selectedCategory === "Всички" || res.category === selectedCategory;
                    
                    const activeGrades = Object.entries(filters.grades).filter(([_, isActive]) => isActive).map(([g]) => g);
                    const matchesGrade = activeGrades.length === 0 || activeGrades.includes(res.grade);
                    
                    const activeFormats = Object.entries(filters.formats).filter(([_, isActive]) => isActive).map(([f]) => f);
                    const matchesFormat = activeFormats.length === 0 || activeFormats.includes(res.format);

                    return matchesSearch && matchesCategory && matchesGrade && matchesFormat;
                });
            }, [resources, searchQuery, selectedCategory, filters]);

            const activeFilterCount = Object.values(filters.grades).filter(Boolean).length + Object.values(filters.formats).filter(Boolean).length;

            // --- Хендлъри (Handlers) ---
            const handleFilterToggle = (type, value) => {
                setFilters(prev => ({
                    ...prev,
                    [type]: { ...prev[type], [value]: !prev[type][value] }
                }));
            };

            const handleLogin = (e) => {
                e.preventDefault();
                if (loginPassword === "admin123") {
                    setIsAdmin(true);
                    setShowLoginModal(false);
                    setLoginPassword("");
                    setLoginError("");
                } else {
                    setLoginError("Грешна парола!");
                }
            };

            const handleLogout = () => {
                setIsAdmin(false);
            };

            const openResourceModal = (resource = null) => {
                if (resource) {
                    setEditingResource(resource);
                    setFormData(resource);
                } else {
                    setEditingResource(null);
                    setFormData({ title: "", category: "Български език", type: "file", format: "pdf", grade: "1-4", url: "" });
                }
                setShowResourceModal(true);
            };

            const handleSaveResource = (e) => {
                e.preventDefault();
                if (editingResource) {
                    setResources(resources.map(r => r.id === editingResource.id ? { ...formData, id: r.id } : r));
                } else {
                    setResources([{ ...formData, id: Date.now() }, ...resources]);
                }
                setShowResourceModal(false);
            };

            const handleDeleteResource = (id) => {
                if (window.confirm("Сигурни ли сте, че искате да изтриете този ресурс?")) {
                    setResources(resources.filter(r => r.id !== id));
                }
            };

            // --- Компоненти ---

            return (
                <div className="min-h-screen flex flex-col font-['Manrope'] selection:bg-teal-200">
                    
                    {/* ХЕДЪР */}
                    <header className="fixed top-0 left-0 right-0 z-40 glass-panel shadow-sm">
                        <div className="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
                            {/* Лого */}
                            <div className="flex items-center gap-3 cursor-pointer" onClick={() => {setSearchQuery(''); setSelectedCategory('Всички');}}>
                                <div className="w-10 h-10 bg-gradient-to-br from-teal-400 to-teal-600 rounded-xl shadow-lg flex items-center justify-center text-white font-black text-xl">
                                    ЛМ
                                </div>
                                <div>
                                    <h1 className="font-black text-lg tracking-tight leading-none text-slate-800 uppercase">ЦСОП Леда Милева</h1>
                                    <p className="text-[10px] font-bold text-teal-600 uppercase tracking-widest mt-1">Специализирана подкрепа</p>
                                </div>
                            </div>

                            {/* Десен панел (Вход / Админ) */}
                            <div className="flex items-center gap-4">
                                {isAdmin ? (
                                    <>
                                        <button onClick={() => openResourceModal()} className="hidden md:flex items-center gap-2 bg-teal-500 hover:bg-teal-600 text-white px-5 py-2.5 rounded-full font-black uppercase text-xs tracking-wider transition-all shadow-lg shadow-teal-500/30">
                                            <Icons.Plus /> Добави Ресурс
                                        </button>
                                        <button onClick={handleLogout} className="flex items-center gap-2 bg-slate-900 hover:bg-slate-800 text-white px-5 py-2.5 rounded-full font-black uppercase text-xs tracking-wider transition-all">
                                            <Icons.Unlock /> Изход
                                        </button>
                                    </>
                                ) : (
                                    <button onClick={() => setShowLoginModal(true)} className="flex items-center gap-2 bg-slate-900 hover:bg-slate-800 text-white px-5 py-2.5 rounded-full font-black uppercase text-xs tracking-wider transition-all shadow-xl shadow-slate-900/10">
                                        <Icons.Lock /> Вход за учители
                                    </button>
                                )}
                            </div>
                        </div>
                    </header>

                    {/* ОСНОВНО СЪДЪРЖАНИЕ */}
                    <main className="flex-grow pt-32 pb-20 px-6 max-w-7xl mx-auto w-full">
                        
                        {/* HERO СЕКЦИЯ */}
                        <div className="text-center max-w-3xl mx-auto mb-12 animate-slide-up">
                            <h2 className="text-4xl md:text-5xl font-black text-slate-900 tracking-tight mb-4 uppercase">
                                Дигитална <span className="text-transparent bg-clip-text bg-gradient-to-r from-teal-500 to-cyan-500">Библиотека</span>
                            </h2>
                            <p className="text-slate-500 font-semibold text-lg max-w-xl mx-auto">
                                Образователни материали, адаптирани игри и ресурси за специална образователна подкрепа.
                            </p>
                        </div>

                        {/* ТЪРСАЧКА И ФИЛТРИ */}
                        <div className="max-w-3xl mx-auto mb-10 relative z-30 animate-slide-up" style={{animationDelay: '0.1s'}}>
                            <div className="flex flex-col sm:flex-row gap-3">
                                <div className="relative flex-grow">
                                    <div className="absolute inset-y-0 left-5 flex items-center pointer-events-none text-slate-400">
                                        <Icons.Search />
                                    </div>
                                    <input 
                                        type="text" 
                                        placeholder="Търсене на материали, игри и уроци..." 
                                        value={searchQuery}
                                        onChange={(e) => setSearchQuery(e.target.value)}
                                        className="w-full pl-14 pr-6 py-4 rounded-3xl border-2 border-slate-200 bg-white text-slate-900 font-bold placeholder-slate-400 focus:outline-none focus:border-teal-500 focus:ring-4 focus:ring-teal-500/10 transition-all shadow-lg shadow-slate-200/50"
                                    />
                                </div>
                                <button 
                                    onClick={() => setShowFilters(!showFilters)}
                                    className={`flex items-center justify-center gap-2 px-6 py-4 rounded-3xl font-black uppercase text-xs tracking-wider transition-all border-2 ${showFilters || activeFilterCount > 0 ? 'bg-teal-500 border-teal-500 text-white shadow-lg shadow-teal-500/30' : 'bg-white border-slate-200 text-slate-600 hover:border-slate-300 shadow-lg shadow-slate-200/50'}`}
                                >
                                    <Icons.Filter /> 
                                    <span className="hidden sm:inline">Филтри</span>
                                    {activeFilterCount > 0 && (
                                        <span className="bg-white text-teal-600 px-2 py-0.5 rounded-full text-[10px] ml-1">{activeFilterCount}</span>
                                    )}
                                </button>
                            </div>

                            {/* ПАДАЩО МЕНЮ С ФИЛТРИ */}
                            {showFilters && (
                                <div className="absolute top-full left-0 right-0 mt-3 bg-white border border-slate-200 p-6 rounded-3xl shadow-2xl animate-pop z-50">
                                    <div className="flex justify-between items-center mb-6 pb-4 border-b border-slate-100">
                                        <h3 className="font-black text-slate-800 uppercase tracking-wide">Допълнителни Филтри</h3>
                                        <button onClick={() => setFilters({grades: {"1-4":false,"5-7":false,"8-10":false,"11-12":false}, formats: {pdf:false,docx:false,ppt:false,video:false,game:false}})} className="text-xs font-bold text-teal-600 hover:text-teal-700 uppercase">Изчисти всички</button>
                                    </div>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-8">
                                        {/* Класове */}
                                        <div>
                                            <h4 className="text-xs font-black text-slate-400 uppercase tracking-widest mb-4">Възрастова група</h4>
                                            <div className="flex flex-wrap gap-2">
                                                {Object.keys(filters.grades).map(grade => (
                                                    <button 
                                                        key={grade}
                                                        onClick={() => handleFilterToggle('grades', grade)}
                                                        className={`px-4 py-2 rounded-xl text-sm font-bold border-2 transition-all ${filters.grades[grade] ? 'bg-slate-900 border-slate-900 text-white' : 'bg-white border-slate-200 text-slate-600 hover:border-slate-300'}`}
                                                    >
                                                        {grade} клас
                                                    </button>
                                                ))}
                                            </div>
                                        </div>
                                        {/* Формати */}
                                        <div>
                                            <h4 className="text-xs font-black text-slate-400 uppercase tracking-widest mb-4">Формат на ресурса</h4>
                                            <div className="flex flex-wrap gap-2">
                                                {Object.keys(filters.formats).map(format => (
                                                    <button 
                                                        key={format}
                                                        onClick={() => handleFilterToggle('formats', format)}
                                                        className={`px-4 py-2 rounded-xl text-sm font-bold border-2 transition-all flex items-center gap-2 ${filters.formats[format] ? 'bg-teal-50 border-teal-500 text-teal-700' : 'bg-white border-slate-200 text-slate-600 hover:border-slate-300'}`}
                                                    >
                                                        {filters.formats[format] && <Icons.Check />}
                                                        {FORMAT_LABELS[format].split(' ')[0]}
                                                    </button>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>

                        {/* КАТЕГОРИИ */}
                        <div className="flex overflow-x-auto pb-4 mb-8 scrollbar-hide gap-3 animate-slide-up" style={{animationDelay: '0.2s'}}>
                            {CATEGORIES.map(cat => (
                                <button
                                    key={cat}
                                    onClick={() => setSelectedCategory(cat)}
                                    className={`whitespace-nowrap px-6 py-3 rounded-2xl font-black text-sm uppercase tracking-wide transition-all border-2 ${selectedCategory === cat ? 'bg-slate-900 border-slate-900 text-white shadow-xl shadow-slate-900/20' : 'bg-white border-slate-200 text-slate-500 hover:border-slate-300 hover:text-slate-800'}`}
                                >
                                    {cat}
                                </button>
                            ))}
                        </div>

                        {/* РЕЗУЛТАТИ (Мрежа от ресурси) */}
                        {filteredResources.length > 0 ? (
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 animate-slide-up" style={{animationDelay: '0.3s'}}>
                                {filteredResources.map((res) => (
                                    <div key={res.id} className="bg-white rounded-[2rem] p-6 border border-slate-100 shadow-xl shadow-slate-200/40 hover:shadow-2xl hover:-translate-y-1 transition-all group flex flex-col">
                                        <div className="flex justify-between items-start mb-4">
                                            <span className={`px-3 py-1 rounded-lg text-[10px] font-black uppercase tracking-widest ${FORMAT_COLORS[res.format] || 'bg-slate-100 text-slate-600'}`}>
                                                {FORMAT_LABELS[res.format] || res.format}
                                            </span>
                                            <span className="text-slate-400 text-xs font-bold px-2 py-1 bg-slate-50 rounded-lg">
                                                {res.grade} кл.
                                            </span>
                                        </div>
                                        
                                        <h3 className="font-black text-xl text-slate-800 mb-2 leading-tight group-hover:text-teal-600 transition-colors">
                                            {res.title}
                                        </h3>
                                        <p className="text-slate-500 font-semibold text-sm mb-6 flex-grow">{res.category}</p>
                                        
                                        <div className="flex items-center justify-between mt-auto pt-4 border-t border-slate-100">
                                            <a href={res.url} className="flex items-center gap-2 text-slate-900 font-black text-sm hover:text-teal-600 transition-colors bg-slate-50 px-4 py-2 rounded-xl group-hover:bg-teal-50">
                                                {res.type === 'link' ? <Icons.Link /> : <Icons.FileText />}
                                                Отвори
                                            </a>
                                            
                                            {/* Админ контроли */}
                                            {isAdmin && (
                                                <div className="flex gap-2">
                                                    <button onClick={() => openResourceModal(res)} className="w-10 h-10 rounded-xl bg-blue-50 text-blue-600 flex items-center justify-center hover:bg-blue-100 transition-colors">
                                                        <Icons.Edit />
                                                    </button>
                                                    <button onClick={() => handleDeleteResource(res.id)} className="w-10 h-10 rounded-xl bg-red-50 text-red-600 flex items-center justify-center hover:bg-red-100 transition-colors">
                                                        <Icons.Trash />
                                                    </button>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        ) : (
                            <div className="text-center py-20 bg-white rounded-[3rem] border border-slate-100 shadow-xl shadow-slate-200/40">
                                <div className="w-20 h-20 bg-slate-50 rounded-full flex items-center justify-center mx-auto mb-4 text-slate-300">
                                    <Icons.Search />
                                </div>
                                <h3 className="text-2xl font-black text-slate-800 mb-2">Няма намерени ресурси</h3>
                                <p className="text-slate-500 font-bold">Опитайте с други ключови думи или променете филтрите.</p>
                                <button onClick={() => {setSearchQuery(''); setFilters({grades: {"1-4":false,"5-7":false,"8-10":false,"11-12":false}, formats: {pdf:false,docx:false,ppt:false,video:false,game:false}}); setSelectedCategory('Всички');}} className="mt-6 text-teal-600 font-black uppercase text-sm hover:underline">Изчисти всички филтри</button>
                            </div>
                        )}
                    </main>

                    {/* ФУТЪР (Оригинален дизайн) */}
                    <footer className="bg-white border-t border-slate-200 mt-auto">
                        <div className="max-w-7xl mx-auto px-6 py-12 flex flex-col items-center">
                            <div className="flex items-center gap-3 mb-8">
                                <div className="w-10 h-10 bg-teal-500 rounded-xl shadow-lg flex items-center justify-center text-white font-black text-xl">
                                    ЛМ
                                </div>
                                <span className="font-black text-xl tracking-tight text-slate-800 uppercase">ЦСОП ЛЕДА МИЛЕВА</span>
                            </div>
                            
                            <div className="flex flex-wrap justify-center gap-8 font-black text-sm text-slate-400 uppercase tracking-widest mb-12">
                                <a href="#" className="hover:text-teal-600 transition-colors">Начало</a>
                                <a href="#" className="hover:text-teal-600 transition-colors">Ресурси</a>
                                <a href="#" className="hover:text-teal-600 transition-colors">Контакти</a>
                                <a href="#" className="hover:text-teal-600 transition-colors">Помощ</a>
                            </div>
                            
                            <div className="w-full flex flex-col md:flex-row justify-between items-center pt-8 border-t border-slate-100 text-xs text-slate-400 font-bold gap-4">
                                <span>© 2024 ЦСОП Леда Милева. Всички права запазени.</span>
                                <span>Изработено с ❤️ за образованието</span>
                            </div>
                        </div>
                    </footer>

                    {/* МОДАЛ: Вход за учители */}
                    {showLoginModal && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 animate-fade-in">
                            <div className="bg-white rounded-[2rem] p-8 w-full max-w-sm shadow-2xl animate-pop relative">
                                <button onClick={() => setShowLoginModal(false)} className="absolute top-6 right-6 text-slate-400 hover:text-slate-800 bg-slate-100 p-2 rounded-full transition-colors">
                                    <Icons.X />
                                </button>
                                <div className="w-16 h-16 bg-slate-900 text-white rounded-2xl flex items-center justify-center mb-6 mx-auto shadow-lg shadow-slate-900/20">
                                    <Icons.Lock />
                                </div>
                                <h3 className="text-2xl font-black text-slate-900 text-center mb-2">Вход за учители</h3>
                                <p className="text-slate-500 text-center font-bold text-sm mb-8">Въведете парола за достъп до административния панел.</p>
                                
                                <form onSubmit={handleLogin} className="flex flex-col gap-4">
                                    <div>
                                        <input 
                                            type="password" 
                                            placeholder="Въведете парола..." 
                                            value={loginPassword}
                                            onChange={(e) => setLoginPassword(e.target.value)}
                                            className="w-full px-5 py-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold focus:outline-none focus:border-slate-900 focus:bg-white transition-all text-center"
                                            autoFocus
                                        />
                                        {loginError && <p className="text-red-500 text-xs font-bold mt-2 text-center">{loginError}</p>}
                                    </div>
                                    <button type="submit" className="w-full py-4 bg-slate-900 text-white rounded-2xl font-black uppercase tracking-wider hover:bg-slate-800 transition-colors shadow-lg shadow-slate-900/20">
                                        Влез в системата
                                    </button>
                                </form>
                                <div className="mt-6 text-center">
                                    <span className="text-[10px] text-slate-400 uppercase font-bold tracking-widest">Тестова парола: admin123</span>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* МОДАЛ: Добавяне/Редакция на Ресурс */}
                    {showResourceModal && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 animate-fade-in overflow-y-auto">
                            <div className="bg-white rounded-[2rem] p-8 w-full max-w-md shadow-2xl animate-pop relative my-8">
                                <button onClick={() => setShowResourceModal(false)} className="absolute top-6 right-6 text-slate-400 hover:text-slate-800 bg-slate-100 p-2 rounded-full transition-colors">
                                    <Icons.X />
                                </button>
                                <h3 className="text-2xl font-black text-slate-900 mb-6 pr-10">{editingResource ? 'Редактирай ресурс' : 'Добави нов ресурс'}</h3>
                                
                                <form onSubmit={handleSaveResource} className="flex flex-col gap-4">
                                    <div>
                                        <label className="block text-xs font-black text-slate-500 uppercase tracking-widest mb-2">Заглавие</label>
                                        <input required type="text" value={formData.title} onChange={e => setFormData({...formData, title: e.target.value})} className="w-full px-5 py-3 bg-slate-50 border-2 border-slate-100 rounded-xl font-bold focus:border-teal-500 focus:bg-white transition-all" />
                                    </div>
                                    
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-xs font-black text-slate-500 uppercase tracking-widest mb-2">Категория</label>
                                            <select value={formData.category} onChange={e => setFormData({...formData, category: e.target.value})} className="w-full px-4 py-3 bg-slate-50 border-2 border-slate-100 rounded-xl font-bold text-sm focus:border-teal-500 focus:bg-white">
                                                {CATEGORIES.filter(c => c !== 'Всички').map(c => <option key={c} value={c}>{c}</option>)}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-xs font-black text-slate-500 uppercase tracking-widest mb-2">Клас</label>
                                            <select value={formData.grade} onChange={e => setFormData({...formData, grade: e.target.value})} className="w-full px-4 py-3 bg-slate-50 border-2 border-slate-100 rounded-xl font-bold text-sm focus:border-teal-500 focus:bg-white">
                                                <option value="1-4">1-4 клас</option>
                                                <option value="5-7">5-7 клас</option>
                                                <option value="8-10">8-10 клас</option>
                                                <option value="11-12">11-12 клас</option>
                                            </select>
                                        </div>
                                    </div>

                                    <div>
                                        <label className="block text-xs font-black text-slate-500 uppercase tracking-widest mb-2">Формат</label>
                                        <select value={formData.format} onChange={e => setFormData({...formData, format: e.target.value})} className="w-full px-4 py-3 bg-slate-50 border-2 border-slate-100 rounded-xl font-bold text-sm focus:border-teal-500 focus:bg-white">
                                            {Object.keys(FORMAT_LABELS).map(key => <option key={key} value={key}>{FORMAT_LABELS[key]}</option>)}
                                        </select>
                                    </div>

                                    <div>
                                        <label className="block text-xs font-black text-slate-500 uppercase tracking-widest mb-2">Линк / URL</label>
                                        <input required type="url" placeholder="https://..." value={formData.url} onChange={e => setFormData({...formData, url: e.target.value})} className="w-full px-5 py-3 bg-slate-50 border-2 border-slate-100 rounded-xl font-bold focus:border-teal-500 focus:bg-white transition-all" />
                                    </div>

                                    <div className="grid grid-cols-2 gap-3 mt-2">
                                        <button type="button" onClick={() => setFormData({...formData, type: 'link'})} className={`p-4 rounded-xl border-2 font-black uppercase tracking-wider text-xs flex justify-center transition-all ${formData.type === 'link' ? 'border-teal-500 bg-teal-50 text-teal-700' : 'border-slate-100 bg-white text-slate-400'}`}>Връзка</button>
                                        <button type="button" onClick={() => setFormData({...formData, type: 'file'})} className={`p-4 rounded-xl border-2 font-black uppercase tracking-wider text-xs flex justify-center transition-all ${formData.type === 'file' ? 'border-teal-500 bg-teal-50 text-teal-700' : 'border-slate-100 bg-white text-slate-400'}`}>Файл</button>
                                    </div>

                                    <button type="submit" className="w-full py-4 mt-4 bg-teal-500 text-white rounded-xl font-black uppercase tracking-wider hover:bg-teal-600 transition-colors shadow-lg shadow-teal-500/30">
                                        {editingResource ? 'Запази промените' : 'Добави в библиотеката'}
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
