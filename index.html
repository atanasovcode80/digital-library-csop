<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дигитална библиотека на ЦСОП "Леда Милева"</title>
    <!-- Зареждане на Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Зареждане на React и Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Зареждане на Lucide икони -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap');
        body { font-family: 'Manrope', sans-serif; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-[#F8FAFC]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        function App() {
            const ADMIN_PASSWORD = '1500510';
            const SUPERVISOR_PASSWORD = 'As800224@';
            const STORAGE_KEY_SUB = 'csop_lib_sub_v3';
            const STORAGE_KEY_RES = 'csop_lib_res_v3';

            const MAIN_CATEGORIES = {
                therapy: { id: 'therapy', name: 'Терапия', icon: 'stethoscope', color: 'from-teal-500 to-emerald-600' },
                education: { id: 'education', name: 'Обучение', icon: 'graduation-cap', color: 'from-orange-400 to-amber-500' }
            };

            const [subfolders, setSubfolders] = useState(() => {
                const saved = localStorage.getItem(STORAGE_KEY_SUB);
                return saved ? JSON.parse(saved) : [
                    { id: 's1', name: 'Логопед', parentId: 'therapy' },
                    { id: 's2', name: 'Психолог', parentId: 'therapy' }
                ];
            });

            const [resources, setResources] = useState(() => {
                const saved = localStorage.getItem(STORAGE_KEY_RES);
                return saved ? JSON.parse(saved) : [];
            });

            const [currentView, setCurrentView] = useState('home');
            const [activeCategory, setActiveCategory] = useState(null);
            const [activeSubfolder, setActiveSubfolder] = useState(null);
            const [role, setRole] = useState(null);
            const [searchQuery, setSearchQuery] = useState('');
            const [isPasswordModalOpen, setIsPasswordModalOpen] = useState(false);
            const [passwordInput, setPasswordInput] = useState('');
            const [isSubfolderModalOpen, setIsSubfolderModalOpen] = useState(false);
            const [isResourceModalOpen, setIsResourceModalOpen] = useState(false);
            const [formData, setFormData] = useState({
                subfolderName: '', subfolderParent: 'therapy',
                resTitle: '', resDescription: '', resUrl: '', resType: 'link'
            });

            useEffect(() => { localStorage.setItem(STORAGE_KEY_SUB, JSON.stringify(subfolders)); }, [subfolders]);
            useEffect(() => { localStorage.setItem(STORAGE_KEY_RES, JSON.stringify(resources)); }, [resources]);
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); });

            const getSubfolderCount = (catId) => subfolders.filter(s => s.parentId === catId).length;
            const getResourceCount = (subId) => resources.filter(r => r.subfolderIds && r.subfolderIds.includes(subId)).length;

            const handleLogin = (e) => {
                e.preventDefault();
                if (passwordInput === ADMIN_PASSWORD) setRole('admin');
                else if (passwordInput === SUPERVISOR_PASSWORD) setRole('supervisor');
                else return alert("Грешна парола!");
                setIsPasswordModalOpen(false);
                setPasswordInput('');
            };

            const handleSaveSubfolder = (e) => {
                e.preventDefault();
                if (!formData.subfolderName.trim()) return;
                const newSub = { id: 's' + Date.now(), name: formData.subfolderName, parentId: formData.subfolderParent };
                setSubfolders([...subfolders, newSub]);
                setIsSubfolderModalOpen(false);
                setFormData({...formData, subfolderName: ''});
            };

            const handleSaveResource = (e) => {
                e.preventDefault();
                if (!formData.resTitle.trim()) return;
                const newRes = {
                    id: 'r' + Date.now(),
                    title: formData.resTitle,
                    description: formData.resDescription,
                    url: formData.resUrl,
                    type: formData.resType,
                    subfolderIds: [activeSubfolder.id]
                };
                setResources([...resources, newRes]);
                setIsResourceModalOpen(false);
                setFormData({...formData, resTitle: '', resDescription: '', resUrl: ''});
            };

            const handleDeleteSubfolder = (id, e) => {
                e.stopPropagation();
                if (window.confirm("Изтриване на раздела и всички материали в него?")) {
                    setSubfolders(subfolders.filter(s => s.id !== id));
                    setResources(resources.filter(r => !r.subfolderIds.includes(id)));
                }
            };

            return (
                <div className="flex flex-col min-h-screen">
                    <header className="bg-white border-b-4 border-teal-600 p-4 sticky top-0 z-50">
                        <div className="max-w-6xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
                            <div className="flex items-center gap-4 cursor-pointer" onClick={() => {setCurrentView('home'); setActiveCategory(null);}}>
                                <div className="bg-teal-600 p-2 rounded-xl text-white"><i data-lucide="book-open"></i></div>
                                <div>
                                    <h1 className="text-sm md:text-lg font-black uppercase tracking-tight text-slate-900">Дигитална библиотека</h1>
                                    <p className="text-[10px] font-bold text-teal-600 uppercase tracking-widest">ЦСОП "Леда Милева", гр. Долни Дъбник</p>
                                </div>
                            </div>
                            <button onClick={() => role ? setRole(null) : setIsPasswordModalOpen(true)} className="px-6 py-2 bg-slate-900 text-white rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-teal-600 transition-colors">
                                {role ? `Изход (${role})` : 'Вход за учители'}
                            </button>
                        </div>
                    </header>

                    <main className="flex-grow max-w-5xl mx-auto w-full p-4 py-8">
                        {currentView === 'home' && (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8 mb-12">
                                {Object.values(MAIN_CATEGORIES).map(cat => (
                                    <div key={cat.id} onClick={() => {setActiveCategory(cat); setCurrentView('category');}} className={`h-48 rounded-[32px] bg-gradient-to-br ${cat.color} p-8 text-white cursor-pointer shadow-xl hover:scale-[1.02] transition-all flex flex-col justify-between relative overflow-hidden group`}>
                                        <div className="absolute right-0 bottom-0 opacity-20 group-hover:scale-110 transition-transform"><i data-lucide={cat.icon} style={{width: '120px', height: '120px'}}></i></div>
                                        <div className="bg-white/20 w-12 h-12 rounded-xl flex items-center justify-center backdrop-blur-md"><i data-lucide={cat.icon}></i></div>
                                        <div>
                                            <h2 className="text-3xl font-black uppercase tracking-tighter">{cat.name}</h2>
                                            <p className="text-[10px] font-bold uppercase opacity-80 tracking-widest">{getSubfolderCount(cat.id)} раздела</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {currentView === 'category' && (
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                <button onClick={() => setCurrentView('home')} className="col-span-full text-xs font-black text-teal-600 uppercase flex items-center gap-2 mb-4"><i data-lucide="arrow-left" size="14"></i> Назад към началото</button>
                                {subfolders.filter(s => s.parentId === activeCategory.id).map(folder => (
                                    <div key={folder.id} onClick={() => {setActiveSubfolder(folder); setCurrentView('subfolder');}} className="bg-white p-6 rounded-[24px] border border-slate-100 shadow-sm hover:border-teal-500 transition-all cursor-pointer group">
                                        <div className="flex justify-between items-start mb-4">
                                            <div className="bg-teal-50 p-3 rounded-xl text-teal-600 group-hover:bg-teal-600 group-hover:text-white transition-all"><i data-lucide="folder-open"></i></div>
                                            {role === 'admin' && <button onClick={(e) => handleDeleteSubfolder(folder.id, e)} className="text-slate-200 hover:text-red-500 transition-colors"><i data-lucide="trash-2" size="18"></i></button>}
                                        </div>
                                        <h3 className="font-black uppercase text-sm text-slate-800">{folder.name}</h3>
                                        <p className="text-[10px] text-slate-400 font-bold uppercase">{getResourceCount(folder.id)} материала</p>
                                    </div>
                                ))}
                                {role === 'admin' && (
                                    <button onClick={() => setIsSubfolderModalOpen(true)} className="p-6 border-2 border-dashed border-slate-200 rounded-[24px] text-slate-400 font-black uppercase text-[10px] hover:border-teal-500 hover:text-teal-600 transition-all flex flex-col items-center justify-center gap-2">
                                        <i data-lucide="plus"></i> Нов раздел
                                    </button>
                                )}
                            </div>
                        )}

                        {currentView === 'subfolder' && (
                            <div className="space-y-4">
                                <button onClick={() => setCurrentView('category')} className="text-xs font-black text-teal-600 uppercase flex items-center gap-2 mb-6"><i data-lucide="arrow-left" size="14"></i> Назад към {activeCategory.name}</button>
                                <div className="flex justify-between items-center mb-8">
                                    <h2 className="text-2xl font-black uppercase text-slate-900 tracking-tight">{activeSubfolder.name}</h2>
                                    {role && <button onClick={() => setIsResourceModalOpen(true)} className="bg-teal-600 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase hover:bg-slate-900 transition-all">+ Добави материал</button>}
                                </div>
                                <div className="grid gap-3">
                                    {resources.filter(r => r.subfolderIds.includes(activeSubfolder.id)).length === 0 && (
                                        <div className="text-center py-12 bg-white rounded-3xl border border-dashed border-slate-200 text-slate-400 text-xs font-bold uppercase">Няма добавени материали в този раздел</div>
                                    )}
                                    {resources.filter(r => r.subfolderIds.includes(activeSubfolder.id)).map(res => (
                                        <div key={res.id} className="bg-white p-4 rounded-2xl border border-slate-100 flex items-center justify-between group hover:shadow-md transition-all">
                                            <div className="flex items-center gap-4">
                                                <div className="p-3 bg-slate-50 rounded-lg text-slate-400"><i data-lucide={res.type === 'file' ? 'file-text' : 'link'}></i></div>
                                                <div>
                                                    <h4 className="font-bold text-sm text-slate-800">{res.title}</h4>
                                                    <p className="text-[10px] text-slate-400 font-medium">{res.description}</p>
                                                </div>
                                            </div>
                                            <div className="flex items-center gap-3">
                                                {role === 'admin' && <button onClick={(e) => {e.stopPropagation(); setResources(resources.filter(r => r.id !== res.id))}} className="text-slate-200 hover:text-red-500"><i data-lucide="trash-2" size="16"></i></button>}
                                                <a href={res.url} target="_blank" rel="noopener noreferrer" className="bg-slate-900 text-white p-2 px-4 rounded-lg text-[10px] font-black uppercase hover:bg-teal-600 transition-colors">Отвори</a>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Парола Модал */}
                    {isPasswordModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm flex items-center justify-center p-4 z-[100]">
                            <div className="bg-white p-8 rounded-[32px] w-full max-w-xs shadow-2xl">
                                <h2 className="text-lg font-black uppercase mb-4 text-center tracking-tighter">Вход за администрация</h2>
                                <form onSubmit={handleLogin} className="space-y-4">
                                    <input type="password" value={passwordInput} onChange={e => setPasswordInput(e.target.value)} className="w-full p-4 bg-slate-100 rounded-xl outline-none focus:ring-2 ring-teal-500 text-center text-xl font-bold" placeholder="••••••" autoFocus />
                                    <button type="submit" className="w-full py-4 bg-teal-600 text-white rounded-xl font-black uppercase text-xs shadow-lg shadow-teal-600/20">Влез</button>
                                    <button type="button" onClick={() => setIsPasswordModalOpen(false)} className="w-full text-[10px] font-black uppercase text-slate-400 hover:text-slate-600 transition-colors">Отказ</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Модал за нов раздел */}
                    {isSubfolderModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm flex items-center justify-center p-4 z-[100]">
                            <div className="bg-white p-8 rounded-[32px] w-full max-w-sm shadow-2xl">
                                <h2 className="text-lg font-black uppercase mb-6 text-slate-900 tracking-tight text-center">Нов раздел в {activeCategory.name}</h2>
                                <form onSubmit={handleSaveSubfolder} className="space-y-4">
                                    <input type="text" value={formData.subfolderName} onChange={e => setFormData({...formData, subfolderName: e.target.value})} className="w-full p-4 bg-slate-100 rounded-xl outline-none focus:ring-2 ring-teal-500 font-bold" placeholder="Име на раздела" autoFocus />
                                    <button type="submit" className="w-full py-4 bg-teal-600 text-white rounded-xl font-black uppercase text-xs">Създай</button>
                                    <button type="button" onClick={() => setIsSubfolderModalOpen(false)} className="w-full text-[10px] font-black uppercase text-slate-400">Отказ</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Модал за нов ресурс */}
                    {isResourceModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm flex items-center justify-center p-4 z-[100]">
                            <div className="bg-white p-8 rounded-[32px] w-full max-w-md shadow-2xl">
                                <h2 className="text-lg font-black uppercase mb-6 text-slate-900 tracking-tight text-center text-teal-600">Добавяне на материал</h2>
                                <form onSubmit={handleSaveResource} className="space-y-4">
                                    <input type="text" value={formData.resTitle} onChange={e => setFormData({...formData, resTitle: e.target.value})} className="w-full p-4 bg-slate-100 rounded-xl outline-none focus:ring-2 ring-teal-500 font-bold" placeholder="Заглавие" />
                                    <input type="text" value={formData.resDescription} onChange={e => setFormData({...formData, resDescription: e.target.value})} className="w-full p-4 bg-slate-100 rounded-xl outline-none focus:ring-2 ring-teal-500 text-sm font-medium" placeholder="Кратко описание" />
                                    <input type="text" value={formData.resUrl} onChange={e => setFormData({...formData, resUrl: e.target.value})} className="w-full p-4 bg-slate-100 rounded-xl outline-none focus:ring-2 ring-teal-500 text-sm font-medium" placeholder="URL адрес (линк)" />
                                    <select value={formData.resType} onChange={e => setFormData({...formData, resType: e.target.value})} className="w-full p-4 bg-slate-100 rounded-xl outline-none focus:ring-2 ring-teal-500 text-xs font-black uppercase">
                                        <option value="link">Интернет линк</option>
                                        <option value="file">Файл / Документ</option>
                                    </select>
                                    <button type="submit" className="w-full py-4 bg-teal-600 text-white rounded-xl font-black uppercase text-xs">Запази</button>
                                    <button type="button" onClick={() => setIsResourceModalOpen(false)} className="w-full text-[10px] font-black uppercase text-slate-400">Отказ</button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
