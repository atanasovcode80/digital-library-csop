<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЦСОП "Леда Милева" - Дигитален Архив</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap');
        body { font-family: 'Manrope', sans-serif; background-color: #f8fafc; }
        .tab-active { border-bottom: 4px solid #0d9488; color: #0d9488; }
        .card-anim { transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .card-anim:hover { transform: translateY(-4px); box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }
        .loader { border-top-color: #0d9488; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const firebaseConfig = JSON.parse(__firebase_config);
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'csop-leda-mileva';

        const { useState, useEffect, useMemo } = React;

        function App() {
            const [user, setUser] = useState(null);
            const [resources, setResources] = useState([]);
            const [loading, setLoading] = useState(true);
            const [activeTab, setActiveTab] = useState("Обучение");
            const [searchQuery, setSearchQuery] = useState("");
            
            // Роли: null, 'admin', 'supervisor'
            const [role, setRole] = useState(null);
            const [showLogin, setShowLogin] = useState(false);
            const [showModal, setShowModal] = useState(false); // За добавяне и редактиране
            const [passwordInput, setPasswordInput] = useState("");
            const [isEditing, setIsEditing] = useState(null); // Съхранява обекта, който се редактира
            
            const [resourceData, setResourceData] = useState({
                title: "", url: "", category: "Обучение", grade: "1-4 клас", format: "PDF"
            });

            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await auth.signInWithCustomToken(__initial_auth_token);
                        } else {
                            await auth.signInAnonymously();
                        }
                    } catch (e) { console.error("Auth Error:", e); }
                };

                const unsubscribe = auth.onAuthStateChanged(u => {
                    if (u) setUser(u);
                    else initAuth();
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const ref = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('resources');
                const unsubscribe = ref.onSnapshot(snap => {
                    setResources(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                    setLoading(false);
                }, err => console.error("Firestore Error:", err));
                return () => unsubscribe();
            }, [user]);

            const filteredData = useMemo(() => {
                return resources.filter(item => {
                    const matchesCategory = item.category === activeTab;
                    const matchesSearch = item.title?.toLowerCase().includes(searchQuery.toLowerCase()) || 
                                          item.grade?.toLowerCase().includes(searchQuery.toLowerCase());
                    return matchesCategory && matchesSearch;
                });
            }, [resources, activeTab, searchQuery]);

            const handleLogin = () => {
                if (passwordInput === "1500510") {
                    setRole('admin');
                    setShowLogin(false);
                    setPasswordInput("");
                } else if (passwordInput === "As800224@") {
                    setRole('supervisor');
                    setShowLogin(false);
                    setPasswordInput("");
                } else {
                    alert("Грешна парола!");
                }
            };

            const handleDelete = async (id) => {
                if (role !== 'supervisor') return;
                if (!confirm("Сигурни ли сте, че искате да изтриете този материал?")) return;
                try {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('resources').doc(id).delete();
                } catch (e) { alert("Грешка при изтриване"); }
            };

            const handleOpenEdit = (item) => {
                if (role !== 'supervisor') return;
                setIsEditing(item.id);
                setResourceData({ ...item });
                setShowModal(true);
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                const collectionRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('resources');
                
                try {
                    if (isEditing) {
                        // Само Супервайзер може да редактира
                        if (role !== 'supervisor') return;
                        await collectionRef.doc(isEditing).update({
                            ...resourceData,
                            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                        });
                    } else {
                        // И двамата могат да добавят
                        await collectionRef.add({
                            ...resourceData,
                            category: activeTab, // Винаги добавяме в текущия таб
                            createdAt: firebase.firestore.FieldValue.serverTimestamp()
                        });
                    }
                    closeModal();
                } catch (e) { alert("Грешка при запис на данните."); }
            };

            const closeModal = () => {
                setShowModal(false);
                setIsEditing(null);
                setResourceData({ title: "", url: "", category: activeTab, grade: "1-4 клас", format: "PDF" });
            };

            if (!user) return <div className="h-screen flex items-center justify-center"><div className="loader w-10 h-10 border-4 border-slate-100 rounded-full"></div></div>;

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Навигация */}
                    <nav className="bg-white border-b border-slate-100 px-6 py-4 flex justify-between items-center sticky top-0 z-50 shadow-sm">
                        <div className="flex items-center gap-3">
                            <div className="bg-teal-600 text-white p-2 rounded-xl">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
                            </div>
                            <div>
                                <h2 className="font-extrabold text-slate-800 text-xs uppercase tracking-tighter leading-none">ЦСОП "Леда Милева"</h2>
                                {role && <span className="text-[9px] font-bold text-teal-600 uppercase tracking-widest">{role === 'supervisor' ? 'Супервайзер' : 'Администратор'}</span>}
                            </div>
                        </div>
                        <div className="flex gap-2">
                            {role && (
                                <button onClick={() => { setResourceData({...resourceData, category: activeTab}); setShowModal(true); }} className="bg-teal-600 text-white px-4 py-2 rounded-xl text-[10px] font-bold uppercase tracking-wider hover:bg-teal-700 transition-all shadow-md">Добави</button>
                            )}
                            <button onClick={() => role ? setRole(null) : setShowLogin(true)} className="bg-slate-900 text-white px-4 py-2 rounded-xl text-[10px] font-bold uppercase tracking-wider hover:bg-slate-800 transition-all shadow-md">
                                {role ? "Изход" : "Вход"}
                            </button>
                        </div>
                    </nav>

                    {/* Хедър */}
                    <header className="bg-white pt-12 pb-8 text-center px-6">
                        <h1 className="text-4xl md:text-5xl font-black text-slate-900 mb-8 uppercase tracking-tighter">Библиотека <span className="text-teal-600">Леда Милева</span></h1>
                        
                        <div className="relative max-w-xl mx-auto mb-10">
                            <input 
                                type="text"
                                placeholder="Търсене на материали..."
                                className="w-full pl-14 pr-6 py-5 bg-slate-50 border-2 border-slate-100 rounded-[2rem] focus:border-teal-500 outline-none transition-all font-bold text-slate-700 text-lg shadow-inner"
                                value={searchQuery}
                                onChange={e => setSearchQuery(e.target.value)}
                            />
                            <div className="absolute left-6 top-1/2 -translate-y-1/2 text-slate-300">
                                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                            </div>
                        </div>

                        <div className="flex justify-center gap-10">
                            {["Обучение", "Терапия"].map(tab => (
                                <button 
                                    key={tab}
                                    onClick={() => setActiveTab(tab)}
                                    className={`pb-4 px-2 text-sm font-black uppercase tracking-[0.2em] transition-all border-b-4 ${activeTab === tab ? "border-teal-600 text-teal-600" : "border-transparent text-slate-400 hover:text-slate-600"}`}
                                >
                                    {tab}
                                </button>
                            ))}
                        </div>
                    </header>

                    {/* Списък */}
                    <main className="flex-grow p-6 md:p-12 max-w-7xl mx-auto w-full">
                        {loading ? (
                            <div className="flex justify-center py-20"><div className="loader w-10 h-10 border-4 border-slate-200 rounded-full"></div></div>
                        ) : filteredData.length === 0 ? (
                            <div className="text-center py-20 bg-white rounded-[3rem] border-4 border-dashed border-slate-50">
                                <p className="text-slate-400 font-black uppercase text-xs tracking-widest italic">Няма открити резултати в {activeTab}</p>
                            </div>
                        ) : (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                                {filteredData.map(item => (
                                    <div key={item.id} className="card-anim bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm flex flex-col relative group">
                                        <div className="flex justify-between items-start mb-6">
                                            <span className={`px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-wider ${activeTab === 'Обучение' ? 'bg-teal-50 text-teal-600' : 'bg-orange-50 text-orange-600'}`}>
                                                {item.format}
                                            </span>
                                            <span className="text-slate-400 font-extrabold text-[10px] bg-slate-50 px-3 py-1 rounded-lg uppercase tracking-widest">{item.grade}</span>
                                        </div>
                                        <h3 className="text-xl font-black text-slate-800 mb-8 leading-tight flex-grow line-clamp-3">{item.title}</h3>
                                        
                                        <div className="flex items-center gap-3 pt-6 border-t border-slate-50">
                                            <a href={item.url} target="_blank" rel="noopener noreferrer" className="flex-grow bg-slate-900 text-white py-4 rounded-2xl font-black text-[10px] uppercase tracking-[0.2em] text-center hover:bg-teal-600 transition-all shadow-xl shadow-slate-100 active:scale-95">Отвори</a>
                                            
                                            {role === 'supervisor' && (
                                                <div className="flex gap-1">
                                                    <button onClick={() => handleOpenEdit(item)} className="p-3 text-slate-400 hover:text-teal-600 hover:bg-teal-50 rounded-xl transition-all" title="Редактирай">
                                                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                                                    </button>
                                                    <button onClick={() => handleDelete(item.id)} className="p-3 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-xl transition-all" title="Изтрий">
                                                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                                                    </button>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    {/* Футер */}
                    <footer className="bg-teal-900 text-white py-12 px-6 text-center">
                        <div className="max-w-4xl mx-auto opacity-90">
                            <p className="font-black text-xs uppercase tracking-[0.4em] mb-4">ЦСОП "Леда Милева" • Дигитален Архив</p>
                            <div className="h-px bg-teal-800 w-16 mx-auto mb-4"></div>
                            <p className="text-[10px] font-bold uppercase tracking-widest">Всички права запазени © {new Date().getFullYear()}</p>
                        </div>
                    </footer>

                    {/* Модал Вход */}
                    {showLogin && (
                        <div className="fixed inset-0 bg-slate-900/70 backdrop-blur-md z-[100] flex items-center justify-center p-6" onClick={() => setShowLogin(false)}>
                            <div className="bg-white p-10 rounded-[3rem] w-full max-w-sm shadow-2xl scale-in" onClick={e => e.stopPropagation()}>
                                <h2 className="text-xl font-black mb-8 uppercase text-center text-slate-900 tracking-widest">Достъп</h2>
                                <input 
                                    type="password"
                                    placeholder="Въведете парола..."
                                    className="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-2xl mb-6 font-bold text-center outline-none focus:border-teal-500 transition-all text-lg"
                                    value={passwordInput}
                                    onChange={e => setPasswordInput(e.target.value)}
                                    autoFocus
                                    onKeyDown={e => e.key === 'Enter' && handleLogin()}
                                />
                                <button onClick={handleLogin} className="w-full bg-slate-900 text-white py-5 rounded-2xl font-black uppercase text-xs tracking-widest shadow-xl active:scale-95 transition-all">Отключи</button>
                            </div>
                        </div>
                    )}

                    {/* Модал Добавяне/Редактиране */}
                    {showModal && (
                        <div className="fixed inset-0 bg-slate-900/70 backdrop-blur-md z-[100] flex items-center justify-center p-6 overflow-y-auto" onClick={closeModal}>
                            <div className="bg-white p-10 rounded-[3rem] w-full max-w-xl shadow-2xl my-auto" onClick={e => e.stopPropagation()}>
                                <div className="flex justify-between items-center mb-10">
                                    <h2 className="text-2xl font-black uppercase text-slate-900 tracking-tighter">{isEditing ? "Редактиране" : "Добавяне"}</h2>
                                    <button onClick={closeModal} className="p-2 hover:bg-slate-100 rounded-full text-slate-400 transition-all">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                                    </button>
                                </div>
                                <form onSubmit={handleSubmit} className="flex flex-col gap-6">
                                    <div>
                                        <label className="text-[10px] font-black uppercase text-slate-400 mb-2 block ml-3 tracking-widest">Име на ресурса</label>
                                        <input required className="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-[1.5rem] font-bold outline-none focus:border-teal-500 transition-all" value={resourceData.title} onChange={e => setResourceData({...resourceData, title: e.target.value})} />
                                    </div>
                                    <div>
                                        <label className="text-[10px] font-black uppercase text-slate-400 mb-2 block ml-3 tracking-widest">Директен линк</label>
                                        <input required type="url" className="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-[1.5rem] font-bold outline-none focus:border-teal-500 transition-all" value={resourceData.url} onChange={e => setResourceData({...resourceData, url: e.target.value})} />
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="text-[10px] font-black uppercase text-slate-400 mb-2 block ml-3 tracking-widest">Група / Клас</label>
                                            <select className="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-[1.5rem] font-bold outline-none focus:border-teal-500 transition-all appearance-none" value={resourceData.grade} onChange={e => setResourceData({...resourceData, grade: e.target.value})}>
                                                <option>1-4 клас</option>
                                                <option>5-7 клас</option>
                                                <option>8-10 клас</option>
                                                <option>11-12 клас</option>
                                                <option>Общо / Всички</option>
                                            </select>
                                        </div>
                                        <div>
                                            <label className="text-[10px] font-black uppercase text-slate-400 mb-2 block ml-3 tracking-widest">Формат</label>
                                            <select className="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-[1.5rem] font-bold outline-none focus:border-teal-500 transition-all appearance-none" value={resourceData.format} onChange={e => setResourceData({...resourceData, format: e.target.value})}>
                                                <option>PDF</option>
                                                <option>ПРЕЗЕНТАЦИЯ</option>
                                                <option>ВИДЕО</option>
                                                <option>ИГРА</option>
                                                <option>ТЕКСТ</option>
                                            </select>
                                        </div>
                                    </div>
                                    <button type="submit" className="bg-teal-600 text-white py-6 rounded-[2rem] font-black uppercase text-xs tracking-[0.3em] shadow-xl shadow-teal-100 active:scale-95 transition-all mt-4 hover:bg-teal-700">Запази промените</button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
