<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Библиотека Ресурси - ЦСОП</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Firebase SDKs (Compat versions for easy Babel integration) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-slate-50 min-h-screen font-sans">
    <div id="root">
        <div class="flex h-screen items-center justify-center flex-col gap-4">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
            <p class="text-slate-500 font-medium">Зареждане на интерфейса...</p>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // Configuration
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        const ADMIN_PASS = "1500510";
        const SUPER_ADMIN_PASS = "As800224@";

        function App() {
            const [user, setUser] = useState(null);
            const [resources, setResources] = useState([]);
            const [categories, setCategories] = useState([]);
            const [loadingState, setLoadingState] = useState("auth");
            const [errorMsg, setErrorMsg] = useState(null);
            
            const [activeTab, setActiveTab] = useState('home');
            const [adminRole, setAdminRole] = useState(null);
            const [showLogin, setShowLogin] = useState(false);
            const [showAddModal, setShowAddModal] = useState(false);
            const [password, setPassword] = useState("");
            
            const [newResource, setNewResource] = useState({ 
                title: '', link: '', description: '', category: 'Общи', tags: [] 
            });

            // Authentication Initialization
            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await auth.signInWithCustomToken(__initial_auth_token);
                        } else {
                            await auth.signInAnonymously();
                        }
                    } catch (err) {
                        console.error("Auth error:", err);
                        setErrorMsg("Грешка при вход: " + err.message);
                        setLoadingState("error");
                    }
                };

                initAuth();
                const unsubscribe = auth.onAuthStateChanged((u) => {
                    if (u) {
                        setUser(u);
                        setLoadingState("data");
                    }
                });
                return () => unsubscribe();
            }, []);

            // Data Sync
            useEffect(() => {
                if (!user) return;

                const resPath = `artifacts/${appId}/public/data/resources`;
                const catPath = `artifacts/${appId}/public/data/categories`;

                const unsubRes = db.collection(resPath).onSnapshot(
                    (snapshot) => {
                        const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        setResources(data);
                        setLoadingState("ready");
                    },
                    (err) => {
                        console.error("Resources error:", err);
                        setErrorMsg("Грешка при достъп до базата данни.");
                    }
                );

                const unsubCat = db.collection(catPath).onSnapshot(
                    (snapshot) => {
                        const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        setCategories(data.length > 0 ? data : [{ name: "Общи", id: 'default' }]);
                    }
                );

                return () => { unsubRes(); unsubCat(); };
            }, [user]);

            const handleLogin = () => {
                if (password === SUPER_ADMIN_PASS) { setAdminRole('superadmin'); setShowLogin(false); }
                else if (password === ADMIN_PASS) { setAdminRole('admin'); setShowLogin(false); }
                else { alert("Грешна парола!"); }
                setPassword("");
            };

            const addResource = async () => {
                if (!newResource.title || !newResource.link) return;
                try {
                    await db.collection(`artifacts/${appId}/public/data/resources`).add({
                        ...newResource,
                        createdAt: Date.now(),
                        uid: user.uid
                    });
                    setShowAddModal(false);
                    setNewResource({ title: '', link: '', description: '', category: 'Общи', tags: [] });
                } catch (e) { alert("Грешка: " + e.message); }
            };

            const deleteResource = async (id) => {
                if (adminRole !== 'superadmin') return;
                try {
                    await db.doc(`artifacts/${appId}/public/data/resources/${id}`).delete();
                } catch (e) { console.error(e); }
            };

            if (loadingState === "error") {
                return (
                    <div className="flex h-screen items-center justify-center p-6 text-center">
                        <div className="bg-white p-8 rounded-3xl shadow-xl border border-red-100 max-w-sm">
                            <div className="text-4xl mb-4">⚠️</div>
                            <h2 className="text-xl font-bold text-slate-800 mb-2">Грешка</h2>
                            <p className="text-slate-500 text-sm mb-6">{errorMsg}</p>
                            <button onClick={() => window.location.reload()} className="w-full bg-slate-900 text-white py-3 rounded-xl font-bold">Опитай пак</button>
                        </div>
                    </div>
                );
            }

            if (loadingState !== "ready") {
                return (
                    <div className="flex h-screen items-center justify-center flex-col gap-4">
                        <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
                        <p className="text-slate-500 font-medium">Свързване с облака...</p>
                    </div>
                );
            }

            return (
                <div className="max-w-4xl mx-auto p-4 md:p-8">
                    <header className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 mb-8 flex flex-col md:flex-row justify-between items-center gap-4">
                        <div className="text-center md:text-left">
                            <h1 className="text-2xl font-black text-slate-800 tracking-tight">📚 ДИГИТАЛНА БИБЛИОТЕКА</h1>
                            <p className="text-slate-400 text-sm font-medium">ЦСОП „Леда Милева“</p>
                        </div>
                        <div className="flex items-center gap-3">
                            {adminRole ? (
                                <>
                                    <span className="text-[10px] bg-indigo-50 text-indigo-600 px-3 py-1 rounded-full font-black uppercase tracking-widest">{adminRole}</span>
                                    <button onClick={() => setShowAddModal(true)} className="bg-blue-600 text-white px-4 py-2 rounded-xl text-sm font-bold shadow-lg shadow-blue-100">＋ НОВ</button>
                                    <button onClick={() => setAdminRole(null)} className="text-slate-300 hover:text-red-500 text-xl">✕</button>
                                </>
                            ) : (
                                <button onClick={() => setShowLogin(true)} className="text-slate-200 hover:text-slate-400">🔐</button>
                            )}
                        </div>
                    </header>

                    <nav className="flex gap-2 overflow-x-auto pb-4 mb-6 no-scrollbar">
                        <button 
                            onClick={() => setActiveTab('home')}
                            className={`px-5 py-2.5 rounded-2xl text-sm font-bold transition-all whitespace-nowrap ${activeTab === 'home' ? 'bg-slate-900 text-white' : 'bg-white text-slate-500'}`}
                        >
                            Всички
                        </button>
                        {categories.map(cat => (
                            <button 
                                key={cat.id}
                                onClick={() => setActiveTab(cat.name)}
                                className={`px-5 py-2.5 rounded-2xl text-sm font-bold transition-all whitespace-nowrap ${activeTab === cat.name ? 'bg-slate-900 text-white' : 'bg-white text-slate-500'}`}
                            >
                                {cat.name}
                            </button>
                        ))}
                    </nav>

                    <div className="grid gap-4">
                        {resources.filter(r => activeTab === 'home' || r.category === activeTab).map(res => (
                            <div key={res.id} className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                                <div className="flex-1">
                                    <span className="text-[10px] bg-blue-50 text-blue-600 px-2 py-0.5 rounded-lg font-bold uppercase mb-2 inline-block">{res.category}</span>
                                    <h3 className="text-lg font-bold text-slate-800 leading-tight mb-1">{res.title}</h3>
                                    <p className="text-slate-500 text-sm line-clamp-2">{res.description}</p>
                                </div>
                                <div className="flex gap-2 w-full md:w-auto">
                                    <a href={res.link} target="_blank" className="flex-1 md:flex-none text-center bg-slate-100 hover:bg-slate-200 text-slate-700 px-6 py-3 rounded-2xl text-sm font-bold">Отвори</a>
                                    {adminRole === 'superadmin' && (
                                        <button onClick={() => deleteResource(res.id)} className="p-3 text-red-200 hover:text-red-500 transition-all">🗑️</button>
                                    )}
                                </div>
                            </div>
                        ))}
                    </div>

                    {showLogin && (
                        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-md flex items-center justify-center p-4 z-50">
                            <div className="bg-white p-8 rounded-[40px] shadow-2xl w-full max-w-xs">
                                <h2 className="text-center font-black text-slate-800 mb-6 uppercase text-xl">Админ Вход</h2>
                                <input 
                                    type="password" 
                                    value={password}
                                    onChange={e => setPassword(e.target.value)}
                                    placeholder="Парола"
                                    className="w-full bg-slate-50 p-4 rounded-2xl mb-4 outline-none focus:ring-2 focus:ring-blue-500"
                                />
                                <button onClick={handleLogin} className="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold">ВХОД</button>
                                <button onClick={() => setShowLogin(false)} className="w-full text-slate-400 py-3 text-xs font-bold mt-2">ОТКАЗ</button>
                            </div>
                        </div>
                    )}

                    {showAddModal && (
                        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-md flex items-center justify-center p-4 z-50 overflow-y-auto">
                            <div className="bg-white p-8 rounded-[40px] shadow-2xl w-full max-w-lg my-8">
                                <h2 className="text-2xl font-black text-slate-800 mb-6">НОВ РЕСУРС</h2>
                                <div className="space-y-4">
                                    <input placeholder="Заглавие" className="w-full bg-slate-50 p-4 rounded-2xl outline-none" value={newResource.title} onChange={e => setNewResource({...newResource, title: e.target.value})} />
                                    <input placeholder="Линк (URL)" className="w-full bg-slate-50 p-4 rounded-2xl outline-none" value={newResource.link} onChange={e => setNewResource({...newResource, link: e.target.value})} />
                                    <select className="w-full bg-slate-50 p-4 rounded-2xl outline-none" value={newResource.category} onChange={e => setNewResource({...newResource, category: e.target.value})}>
                                        <option value="Общи">Общи</option>
                                        <option value="Книги">Книги</option>
                                        <option value="Материали">Материали</option>
                                        <option value="Терапия">Терапия</option>
                                    </select>
                                    <textarea placeholder="Описание" className="w-full bg-slate-50 p-4 rounded-2xl outline-none h-32" value={newResource.description} onChange={e => setNewResource({...newResource, description: e.target.value})} />
                                    <div className="flex gap-4 pt-4">
                                        <button onClick={() => setShowAddModal(false)} className="flex-1 text-slate-400 font-bold">ОТКАЗ</button>
                                        <button onClick={addResource} className="flex-1 bg-blue-600 text-white py-4 rounded-2xl font-bold">ДОБАВИ</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
