<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дигитална библиотека на ЦСОП "Леда Милева"</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800;900&display=swap');
        body { 
            font-family: 'Manrope', sans-serif; 
            background-color: #F8FAFC; 
            color: #0F172A; 
            margin: 0;
            padding: 0;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }
        .animate-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, addDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";

        const { useState, useEffect } = React;

        // Firebase Config
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'csop-library-v2';

        function App() {
            const [resources, setResources] = useState([]);
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [isAdmin, setIsAdmin] = useState(false);
            const [showLogin, setShowLogin] = useState(false);
            const [showAdd, setShowAdd] = useState(false);
            const [search, setSearch] = useState("");
            const [activeCat, setActiveCat] = useState("Всички");
            const [passInput, setPassInput] = useState("");

            // Form State
            const [form, setForm] = useState({ title: "", category: "Обучение", format: "pdf", grade: "1-4", url: "" });

            // 1. Инициализация на Auth
            useEffect(() => {
                const performAuth = async () => {
                    try {
                        await signInAnonymously(auth);
                    } catch (e) {
                        console.error("Auth Error:", e);
                    }
                };
                performAuth();
                const unsubscribe = onAuthStateChanged(auth, (u) => {
                    if (u) setUser(u);
                });
                return () => unsubscribe();
            }, []);

            // 2. Слушател за данни
            useEffect(() => {
                if (!user) return;
                
                setLoading(true);
                const collectionPath = collection(db, 'artifacts', appId, 'public', 'data', 'resources');
                
                const unsubscribe = onSnapshot(collectionPath, (snapshot) => {
                    const data = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                    setResources(data);
                    setLoading(false);
                }, (error) => {
                    console.error("Firestore Error:", error);
                    setLoading(false);
                });

                return () => unsubscribe();
            }, [user]);

            const handleLogin = () => {
                if (passInput === "1500510") {
                    setIsAdmin(true);
                    setShowLogin(false);
                    setPassInput("");
                } else {
                    alert("Грешна парола!");
                }
            };

            const handleAdd = async (e) => {
                e.preventDefault();
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'resources'), {
                        ...form,
                        createdAt: Date.now()
                    });
                    setShowAdd(false);
                    setForm({ title: "", category: "Обучение", format: "pdf", grade: "1-4", url: "" });
                } catch (e) {
                    alert("Грешка при запис в базата!");
                }
            };

            const handleDelete = async (id) => {
                if(confirm("Наистина ли искате да изтриете този ресурс?")) {
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'resources', id));
                }
            };

            const filtered = resources.filter(r => 
                r.title.toLowerCase().includes(search.toLowerCase()) &&
                (activeCat === "Всички" || r.category === activeCat)
            );

            return (
                <div className="min-h-screen">
                    {/* Header */}
                    <header className="fixed top-0 w-full z-50 glass-panel h-20 flex items-center px-6 justify-between">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-teal-600 rounded-xl flex items-center justify-center text-white font-black text-xl">Л</div>
                            <h1 className="font-black text-sm uppercase tracking-tight">Библиотека ЦСОП</h1>
                        </div>
                        <div className="flex gap-2">
                            {isAdmin ? (
                                <>
                                    <button onClick={() => setShowAdd(true)} className="bg-teal-600 text-white px-5 py-2.5 rounded-full text-xs font-black uppercase shadow-lg shadow-teal-200">Добави +</button>
                                    <button onClick={() => setIsAdmin(false)} className="bg-slate-800 text-white px-5 py-2.5 rounded-full text-xs font-black uppercase">Изход</button>
                                </>
                            ) : (
                                <button onClick={() => setShowLogin(true)} className="bg-slate-900 text-white px-5 py-2.5 rounded-full text-xs font-black uppercase">Учителски Вход</button>
                            )}
                        </div>
                    </header>

                    {/* Hero Section */}
                    <main className="pt-32 pb-20 px-6 max-w-6xl mx-auto">
                        <div className="text-center mb-12 animate-in">
                            <h2 className="text-5xl font-black mb-4 uppercase tracking-tighter">Дигитален <span className="text-teal-600">Архив</span></h2>
                            <p className="text-slate-500 font-bold max-w-lg mx-auto">Специализирани материали за ученици със СОП</p>
                        </div>

                        {/* Search & Filters */}
                        <div className="flex flex-col md:flex-row gap-4 mb-10 animate-in" style={{animationDelay: '0.1s'}}>
                            <input 
                                type="text" 
                                placeholder="Търсене по заглавие..." 
                                className="flex-grow p-5 rounded-2xl border-2 border-slate-100 focus:border-teal-500 outline-none font-bold text-lg shadow-sm"
                                value={search}
                                onChange={e => setSearch(e.target.value)}
                            />
                            <div className="flex bg-white p-1.5 rounded-2xl border-2 border-slate-100 overflow-x-auto shadow-sm">
                                {["Всички", "Обучение", "Терапия"].map(c => (
                                    <button 
                                        key={c}
                                        onClick={() => setActiveCat(c)}
                                        className={`px-6 py-3 rounded-xl font-black uppercase text-[10px] whitespace-nowrap transition-all ${activeCat === c ? 'bg-slate-900 text-white shadow-md' : 'text-slate-400'}`}
                                    >
                                        {c}
                                    </button>
                                ))}
                            </div>
                        </div>

                        {/* Grid */}
                        {loading ? (
                            <div className="flex flex-col items-center justify-center py-20 gap-4">
                                <div className="w-12 h-12 border-4 border-teal-200 border-t-teal-600 rounded-full animate-spin"></div>
                                <p className="font-black text-slate-300 uppercase tracking-widest text-sm">Свързване с базата...</p>
                            </div>
                        ) : filtered.length === 0 ? (
                            <div className="text-center py-20 bg-white rounded-[3rem] border-2 border-dashed border-slate-100">
                                <p className="font-black text-slate-400 uppercase text-xs">Няма открити ресурси</p>
                            </div>
                        ) : (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                {filtered.map((r, i) => (
                                    <div key={r.id} className="bg-white p-6 rounded-[2.5rem] border border-slate-100 shadow-xl shadow-slate-200/40 hover:-translate-y-2 transition-all animate-in" style={{animationDelay: `${i * 0.05}s`}}>
                                        <div className="flex justify-between mb-4">
                                            <span className="bg-teal-50 text-teal-600 px-3 py-1 rounded-lg text-[10px] font-black uppercase tracking-wider">{r.format}</span>
                                            <span className="text-slate-300 font-black text-[10px] uppercase">{r.grade} клас</span>
                                        </div>
                                        <h3 className="font-black text-xl mb-2 text-slate-800 leading-tight h-14 overflow-hidden">{r.title}</h3>
                                        <p className="text-slate-400 font-bold text-xs mb-6 uppercase tracking-widest">{r.category}</p>
                                        <div className="flex items-center justify-between pt-4 border-t border-slate-50">
                                            <a href={r.url} target="_blank" className="bg-slate-50 hover:bg-teal-600 hover:text-white text-teal-600 px-6 py-3 rounded-xl font-black text-[10px] uppercase transition-colors">Отвори</a>
                                            {isAdmin && (
                                                <button onClick={() => handleDelete(r.id)} className="text-red-400 hover:text-red-600 font-black text-[10px] uppercase">Изтрий</button>
                                            )}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    {/* Modals */}
                    {showLogin && (
                        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-md z-[100] flex items-center justify-center p-6" onClick={e => e.target === e.currentTarget && setShowLogin(false)}>
                            <div className="bg-white p-10 rounded-[3rem] w-full max-w-sm shadow-2xl animate-in">
                                <h3 className="text-3xl font-black mb-2 text-center">ВХОД</h3>
                                <p className="text-slate-400 text-xs font-bold text-center mb-8 uppercase tracking-widest">Административен панел</p>
                                <input 
                                    type="password" 
                                    placeholder="Парола..." 
                                    className="w-full p-5 bg-slate-50 rounded-2xl border-2 border-slate-100 mb-4 font-black text-center text-xl tracking-[0.5em]"
                                    value={passInput}
                                    onChange={e => setPassInput(e.target.value)}
                                    onKeyDown={e => e.key === 'Enter' && handleLogin()}
                                    autoFocus
                                />
                                <button onClick={handleLogin} className="w-full bg-slate-900 text-white py-5 rounded-2xl font-black uppercase shadow-xl hover:bg-slate-800 transition-all">Влез</button>
                            </div>
                        </div>
                    )}

                    {showAdd && (
                        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-md z-[100] flex items-center justify-center p-6" onClick={e => e.target === e.currentTarget && setShowAdd(false)}>
                            <div className="bg-white p-10 rounded-[3rem] w-full max-w-lg shadow-2xl animate-in">
                                <h3 className="text-2xl font-black mb-8">ДОБАВЯНЕ НА МАТЕРИАЛ</h3>
                                <form onSubmit={handleAdd} className="flex flex-col gap-5">
                                    <input required placeholder="Име на ресурса..." className="p-5 bg-slate-50 rounded-2xl border-2 border-slate-100 font-bold" value={form.title} onChange={e => setForm({...form, title: e.target.value})} />
                                    
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="flex flex-col gap-2">
                                            <label className="text-[10px] font-black uppercase text-slate-400 pl-2">Категория</label>
                                            <select className="p-5 bg-slate-50 rounded-2xl font-bold appearance-none cursor-pointer" value={form.category} onChange={e => setForm({...form, category: e.target.value})}>
                                                <option>Обучение</option>
                                                <option>Терапия</option>
                                            </select>
                                        </div>
                                        <div className="flex flex-col gap-2">
                                            <label className="text-[10px] font-black uppercase text-slate-400 pl-2">Формат</label>
                                            <select className="p-5 bg-slate-50 rounded-2xl font-bold appearance-none cursor-pointer" value={form.format} onChange={e => setForm({...form, format: e.target.value})}>
                                                <option value="pdf">PDF Документ</option>
                                                <option value="video">Видео урок</option>
                                                <option value="game">Игра/Упражнение</option>
                                                <option value="docx">Word Документ</option>
                                            </select>
                                        </div>
                                    </div>

                                    <div className="flex flex-col gap-2">
                                        <label className="text-[10px] font-black uppercase text-slate-400 pl-2">Подходящо за</label>
                                        <select className="p-5 bg-slate-50 rounded-2xl font-bold appearance-none cursor-pointer" value={form.grade} onChange={e => setForm({...form, grade: e.target.value})}>
                                            <option value="1-4">1-4 клас</option>
                                            <option value="5-7">5-7 клас</option>
                                            <option value="8-10">8-10 клас</option>
                                            <option value="11-12">11-12 клас</option>
                                        </select>
                                    </div>

                                    <input required type="url" placeholder="Линк (URL)..." className="p-5 bg-slate-50 rounded-2xl border-2 border-slate-100 font-bold" value={form.url} onChange={e => setForm({...form, url: e.target.value})} />
                                    
                                    <button className="bg-teal-600 text-white py-5 rounded-2xl font-black uppercase shadow-xl shadow-teal-100 mt-4">Запази Ресурс</button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
