<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дигитална библиотека - ЦСОП "Леда Милева"</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            -webkit-font-smoothing: antialiased;
            background-color: #f8fafc;
        }
        .loading-bar {
            height: 3px;
            width: 100%;
            background: linear-gradient(to right, #0d9488, #0f172a);
            position: fixed;
            top: 0;
            left: 0;
            z-index: 100;
            animation: loading 1.5s infinite ease-in-out;
        }
        @keyframes loading {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        .card-enter { animation: slideUp 0.2s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        try {
            const firebaseConfig = JSON.parse(__firebase_config);
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const db = getFirestore(app);
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'csop-lm-library';

            window.fb = { db, auth, appId, collection, doc, onSnapshot, query, signInWithCustomToken, signInAnonymously, onAuthStateChanged };
        } catch (e) {
            console.error("Firebase init failed:", e);
        }
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // Вградени SVG икони за моментално зареждане
        const Icons = {
            Book: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>,
            Search: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>,
            Folder: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>,
            ChevronLeft: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>,
            FileText: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>,
            ExternalLink: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
        };

        const MAIN_CATEGORIES = [
            { id: 'therapy', name: 'Терапия', color: 'bg-teal-600', gradient: 'from-teal-600 to-emerald-600' },
            { id: 'education', name: 'Обучение', color: 'bg-orange-500', gradient: 'from-orange-500 to-amber-500' }
        ];

        function App() {
            const [data, setData] = useState({ subs: [], res: [] });
            const [view, setView] = useState({ type: 'home', active: null });
            const [loading, setLoading] = useState(true);
            const [search, setSearch] = useState('');

            useEffect(() => {
                const interval = setInterval(() => {
                    if (window.fb) {
                        clearInterval(interval);
                        initFirebase();
                    }
                }, 30);
                return () => clearInterval(interval);
            }, []);

            async function initFirebase() {
                try {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await fb.signInWithCustomToken(fb.auth, __initial_auth_token);
                    } else {
                        await fb.signInAnonymously(fb.auth);
                    }

                    fb.onSnapshot(fb.collection(fb.db, 'artifacts', fb.appId, 'public', 'data', 'subfolders'), (s) => {
                        const subs = s.docs.map(d => ({ id: d.id, ...d.data() }));
                        setData(prev => ({ ...prev, subs }));
                        setLoading(false);
                    });

                    fb.onSnapshot(fb.collection(fb.db, 'artifacts', fb.appId, 'public', 'data', 'resources'), (s) => {
                        setData(prev => ({ ...prev, res: s.docs.map(d => ({ id: d.id, ...d.data() })) }));
                    });
                } catch (e) { console.error(e); setLoading(false); }
            }

            const searchResults = useMemo(() => {
                const term = search.toLowerCase();
                if (!term) return [];
                return data.res.filter(r => r.title?.toLowerCase().includes(term));
            }, [search, data.res]);

            return (
                <div className="min-h-screen pb-20">
                    {loading && <div className="loading-bar"></div>}

                    <header className="bg-[#0f172a] text-white p-4 sticky top-0 z-50 shadow-lg">
                        <div className="max-w-5xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
                            <div className="flex items-center gap-3 cursor-pointer" onClick={() => setView({type:'home', active:null})}>
                                <div className="bg-teal-500 p-2 rounded-xl text-white"><Icons.Book /></div>
                                <div>
                                    <h1 className="font-black uppercase text-sm leading-none">Библиотека</h1>
                                    <span className="text-[9px] font-bold text-teal-400 uppercase tracking-tighter">ЦСОП "Леда Милева"</span>
                                </div>
                            </div>

                            <div className="relative w-full max-w-sm">
                                <span className="absolute left-4 top-1/2 -translate-y-1/2 text-white/30"><Icons.Search /></span>
                                <input 
                                    className="w-full bg-white/10 border border-white/5 rounded-2xl py-2.5 pl-11 pr-4 text-sm focus:bg-white/20 outline-none transition-all placeholder:text-white/20"
                                    placeholder="Търсене в архива..."
                                    value={search}
                                    onChange={e => setSearch(e.target.value)}
                                />
                            </div>
                        </div>
                    </header>

                    <main className="max-w-5xl mx-auto p-4 md:p-8">
                        {search ? (
                            <div className="card-enter space-y-4">
                                <div className="flex justify-between items-center border-b pb-4">
                                    <h2 className="text-xl font-black uppercase text-slate-800">Резултати ({searchResults.length})</h2>
                                    <button onClick={() => setSearch('')} className="text-[10px] font-black uppercase text-teal-600">Изчисти</button>
                                </div>
                                <div className="grid gap-3">
                                    {searchResults.map(r => (
                                        <div key={r.id} className="bg-white p-4 rounded-2xl border border-slate-100 flex items-center justify-between shadow-sm">
                                            <div className="flex items-center gap-3">
                                                <div className="text-slate-300"><Icons.FileText /></div>
                                                <span className="font-bold text-slate-700 text-sm">{r.title}</span>
                                            </div>
                                            <a href={r.url} target="_blank" className="bg-slate-900 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase">Отвори</a>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ) : (
                            <>
                                {view.type === 'home' && (
                                    <div className="grid md:grid-cols-2 gap-6 py-4 card-enter">
                                        {MAIN_CATEGORIES.map(cat => (
                                            <div 
                                                key={cat.id}
                                                onClick={() => setView({type:'category', active: cat})}
                                                className={`h-48 md:h-64 rounded-[32px] bg-gradient-to-br ${cat.gradient} p-8 text-white cursor-pointer shadow-xl hover:scale-[1.02] transition-transform flex flex-col justify-end relative overflow-hidden`}
                                            >
                                                <div className="absolute top-8 right-8 opacity-20 scale-150"><Icons.Book /></div>
                                                <h2 className="text-3xl font-black uppercase tracking-tight">{cat.name}</h2>
                                                <p className="text-[10px] font-black uppercase tracking-widest opacity-60">Разгледай секцията</p>
                                            </div>
                                        ))}
                                    </div>
                                )}

                                {view.type === 'category' && (
                                    <div className="card-enter space-y-6">
                                        <button onClick={() => setView({type:'home'})} className="flex items-center gap-1 text-[10px] font-black uppercase text-slate-400 hover:text-teal-600">
                                            <Icons.ChevronLeft /> Назад
                                        </button>
                                        <h2 className="text-3xl font-black uppercase text-slate-900">{view.active.name}</h2>
                                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                                            {data.subs.filter(s => s.parentId === view.active.id).map(f => (
                                                <div 
                                                    key={f.id}
                                                    onClick={() => setView({type:'folder', active: f, parent: view.active})}
                                                    className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm hover:border-teal-500 cursor-pointer transition-all flex items-center gap-4 group"
                                                >
                                                    <div className="p-3 bg-slate-50 rounded-2xl text-slate-300 group-hover:text-teal-500"><Icons.Folder /></div>
                                                    <span className="font-black uppercase text-sm text-slate-800 leading-tight">{f.name}</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {view.type === 'folder' && (
                                    <div className="card-enter space-y-6">
                                        <button onClick={() => setView({type:'category', active: view.parent})} className="flex items-center gap-1 text-[10px] font-black uppercase text-slate-400">
                                            <Icons.ChevronLeft /> Към {view.parent.name}
                                        </button>
                                        <div className="bg-white p-6 rounded-[24px] border-l-4 border-teal-500 shadow-sm">
                                            <h2 className="text-xl font-black uppercase text-slate-900">{view.active.name}</h2>
                                        </div>
                                        <div className="grid gap-3">
                                            {data.res.filter(r => r.subfolderIds?.includes(view.active.id)).map(r => (
                                                <div key={r.id} className="bg-white p-4 rounded-2xl border border-slate-100 flex items-center justify-between shadow-sm hover:shadow-md transition-shadow">
                                                    <div className="flex items-center gap-3 min-w-0">
                                                        <div className="text-slate-200 shrink-0"><Icons.FileText /></div>
                                                        <div className="truncate">
                                                            <h4 className="font-bold text-slate-800 text-sm truncate">{r.title}</h4>
                                                            <p className="text-[10px] text-slate-400 truncate">{r.description}</p>
                                                        </div>
                                                    </div>
                                                    <a href={r.url} target="_blank" className="ml-4 shrink-0 bg-teal-600 text-white p-2.5 rounded-xl hover:bg-slate-900 transition-colors">
                                                        <Icons.ExternalLink />
                                                    </a>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
