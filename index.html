<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Библиотека Ресурси - ЦСОП</title>
    
    <!-- Външни библиотеки -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Firebase SDK (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        body { background-color: #f1f5f9; font-family: sans-serif; }
        .loader { border: 4px solid #e2e8f0; border-top: 4px solid #3b82f6; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root">
        <div style="display: flex; height: 100vh; align-items: center; justify-content: center; flex-direction: column;">
            <div class="loader"></div>
            <p style="margin-top: 15px; color: #64748b;">Подготовка на ресурсите...</p>
        </div>
    </div>

    <script type="text/babel">
        // Инициализация на Firebase
        const firebaseConfig = JSON.parse(__firebase_config);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        
        const db = firebase.firestore();
        const auth = firebase.auth();

        function App() {
            const [resources, setResources] = React.useState([]);
            const [loading, setLoading] = React.useState(true);
            const [user, setUser] = React.useState(null);
            const [authError, setAuthError] = React.useState(null);

            // 1. Инициализация на сесията (Auth)
            React.useEffect(() => {
                const initAuth = async () => {
                    try {
                        // Приоритет на токена от системата
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await auth.signInWithCustomToken(__initial_auth_token);
                        } else {
                            await auth.signInAnonymously();
                        }
                    } catch (err) {
                        console.error("Auth error:", err);
                        setAuthError(err.message);
                        setLoading(false);
                    }
                };

                initAuth();
                
                // Слушател за състоянието на входа
                const unsubscribe = auth.onAuthStateChanged((u) => {
                    if (u) {
                        setUser(u);
                    }
                });
                
                return () => unsubscribe();
            }, []);

            // 2. Извличане на данни - стартира САМО след успешен Auth
            React.useEffect(() => {
                if (!user) return; // ПРЕКРАТЯВА, ако няма потребител, за да избегне грешката за права

                const path = `artifacts/${appId}/public/data/resources`;
                
                const unsubscribe = db.collection(path).onSnapshot(
                    (snapshot) => {
                        const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        setResources(data);
                        setLoading(false);
                    },
                    (error) => {
                        console.error("Firestore error:", error);
                        setLoading(false);
                    }
                );

                return () => unsubscribe();
            }, [user]); // Зависимост от 'user'

            if (authError) {
                return (
                    <div className="flex h-screen items-center justify-center p-6 text-center">
                        <div className="bg-white p-8 rounded-2xl shadow-sm border border-red-100">
                            <p className="text-red-500 font-bold mb-2">Грешка при оторизация</p>
                            <p className="text-slate-500 text-sm">{authError}</p>
                        </div>
                    </div>
                );
            }

            if (loading) {
                return (
                    <div className="flex h-screen items-center justify-center">
                        <div className="loader"></div>
                    </div>
                );
            }

            return (
                <div className="max-w-2xl mx-auto p-6">
                    <header className="mb-8 text-center">
                        <h1 className="text-2xl font-bold text-slate-800">Библиотека Ресурси</h1>
                        <p className="text-slate-500">ЦСОП „Леда Милева“</p>
                    </header>

                    <div className="space-y-4">
                        {resources.length === 0 ? (
                            <div className="bg-white p-10 rounded-2xl text-center border border-slate-200">
                                <p className="text-slate-400 font-medium">Няма открити ресурси.</p>
                                <p className="text-xs text-slate-300 mt-2">Свързан като: {user?.uid}</p>
                            </div>
                        ) : (
                            resources.map(res => (
                                <div key={res.id} className="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 flex justify-between items-center">
                                    <div>
                                        <h3 className="font-bold text-slate-700">{res.title || "Без заглавие"}</h3>
                                        <p className="text-sm text-slate-500">{res.description || "Няма описание"}</p>
                                    </div>
                                    <a href={res.link} target="_blank" className="bg-blue-50 text-blue-600 px-4 py-2 rounded-lg font-bold text-sm hover:bg-blue-600 hover:text-white transition-colors">
                                        Виж
                                    </a>
                                </div>
                            ))
                        )}
                    </div>
                    
                    <footer className="mt-12 text-center text-slate-300 text-xs">
                        Потребител: {user?.uid}
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
