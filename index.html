<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дигитална Библиотека - ЦСОП</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap');
        body { font-family: 'Montserrat', sans-serif; background: #f8fafc; }
        .book-card:hover { transform: translateY(-5px); transition: all 0.3s ease; }
        .loading-spinner { border-top-color: #3b82f6; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen">

    <!-- Header -->
    <header class="bg-gradient-to-r from-blue-700 to-indigo-800 text-white shadow-lg sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <i class="fas fa-book-reader text-3xl"></i>
                <h1 class="text-xl md:text-2xl font-bold tracking-tight">ЦСОП Дигитална Библиотека</h1>
            </div>
            <button onclick="toggleModal('addBookModal')" class="bg-white text-blue-700 px-4 py-2 rounded-full font-semibold hover:bg-blue-50 transition shadow-md">
                <i class="fas fa-plus mr-2"></i>Добави книга
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container mx-auto px-4 py-8">
        
        <!-- Search & Filter -->
        <div class="mb-8 flex flex-col md:flex-row gap-4">
            <div class="relative flex-1">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                <input type="text" id="searchInput" placeholder="Търсене на заглавие или автор..." 
                    class="w-full pl-12 pr-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 outline-none shadow-sm">
            </div>
            <select id="categoryFilter" class="px-4 py-3 rounded-xl border border-gray-200 bg-white outline-none shadow-sm">
                <option value="all">Всички категории</option>
                <option value="children">Детска литература</option>
                <option value="classic">Класика</option>
                <option value="educational">Учебна литература</option>
                <option value="other">Други</option>
            </select>
        </div>

        <!-- Loading State -->
        <div id="loadingOverlay" class="flex flex-col items-center justify-center py-20">
            <div class="loading-spinner h-12 w-12 border-4 border-gray-200 rounded-full mb-4"></div>
            <p class="text-gray-500 font-medium">Зареждане на библиотеката...</p>
        </div>

        <!-- Book Grid -->
        <div id="bookGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 hidden">
            <!-- Books will be injected here -->
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="hidden text-center py-20">
            <i class="fas fa-books text-6xl text-gray-300 mb-4"></i>
            <h3 class="text-xl font-semibold text-gray-600">Все още няма добавени книги</h3>
            <p class="text-gray-400 mt-2">Бъдете първият, който ще добави книга в библиотеката.</p>
        </div>
    </main>

    <!-- Add Book Modal -->
    <div id="addBookModal" class="fixed inset-0 bg-black/50 hidden z-[60] flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-lg shadow-2xl overflow-hidden">
            <div class="p-6 border-b flex justify-between items-center bg-gray-50">
                <h2 class="text-xl font-bold text-gray-800">Добавяне на нова книга</h2>
                <button onclick="toggleModal('addBookModal')" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times text-xl"></i></button>
            </div>
            <form id="addBookForm" class="p-6 space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Заглавие</label>
                    <input type="text" name="title" required class="w-full p-3 rounded-lg border border-gray-200 focus:border-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Автор</label>
                    <input type="text" name="author" required class="w-full p-3 rounded-lg border border-gray-200 focus:border-blue-500 outline-none">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Категория</label>
                        <select name="category" class="w-full p-3 rounded-lg border border-gray-200 outline-none">
                            <option value="children">Детска</option>
                            <option value="classic">Класика</option>
                            <option value="educational">Учебна</option>
                            <option value="other">Други</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Година</label>
                        <input type="number" name="year" class="w-full p-3 rounded-lg border border-gray-200 outline-none">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Линк към PDF / Корица</label>
                    <input type="url" name="link" placeholder="https://example.com/book.pdf" class="w-full p-3 rounded-lg border border-gray-200 outline-none">
                </div>
                <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold hover:bg-blue-700 transition shadow-lg mt-4">
                    <i class="fas fa-save mr-2"></i>Запази книгата
                </button>
            </form>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Твоята конфигурация, преписана от снимка image_ff9e9e.png
        const myGithubFirebaseConfig = {
            apiKey: "AIzaSyDMUx2UvYY26wU5WZ33Cy6S--Rwl2ZOUcY",
            authDomain: "digital-library-csop.firebaseapp.com",
            projectId: "digital-library-csop",
            storageBucket: "digital-library-csop.firebasestorage.app",
            messagingSenderId: "277590147002",
            appId: "1:277590147002:web:1b179531c66ce742e2783"
        };

        // Инициализация
        const app = initializeApp(myGithubFirebaseConfig);
        const db = getFirestore(app);
        const booksCol = collection(db, "books");

        // Елементи от DOM
        const bookGrid = document.getElementById('bookGrid');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const emptyState = document.getElementById('emptyState');
        const searchInput = document.getElementById('searchInput');
        const categoryFilter = document.getElementById('categoryFilter');
        const addBookForm = document.getElementById('addBookForm');

        let allBooks = [];

        // Слушане за промени в реално време
        onSnapshot(query(booksCol), (snapshot) => {
            allBooks = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderBooks();
            loadingOverlay.classList.add('hidden');
        }, (error) => {
            console.error("Грешка при четене:", error);
            alert("Липсват права за достъп до базата данни. Моля, провери Firestore Rules!");
        });

        // Функция за рендериране
        function renderBooks() {
            const searchTerm = searchInput.value.toLowerCase();
            const selectedCat = categoryFilter.value;

            const filtered = allBooks.filter(book => {
                const matchesSearch = book.title.toLowerCase().includes(searchTerm) || book.author.toLowerCase().includes(searchTerm);
                const matchesCat = selectedCat === 'all' || book.category === selectedCat;
                return matchesSearch && matchesCat;
            });

            if (filtered.length === 0) {
                bookGrid.classList.add('hidden');
                emptyState.classList.remove('hidden');
            } else {
                emptyState.classList.add('hidden');
                bookGrid.classList.remove('hidden');
                bookGrid.innerHTML = filtered.map(book => `
                    <div class="book-card bg-white rounded-2xl p-6 shadow-sm border border-gray-100 relative group">
                        <div class="absolute top-4 right-4 opacity-0 group-hover:opacity-100 transition">
                            <button onclick="deleteBook('${book.id}')" class="text-red-400 hover:text-red-600 p-2 bg-red-50 rounded-lg">
                                <i class="fas fa-trash-alt"></i>
                            </button>
                        </div>
                        <div class="h-40 bg-gray-50 rounded-xl mb-4 flex items-center justify-center text-blue-300">
                             <i class="fas fa-book text-5xl"></i>
                        </div>
                        <h3 class="font-bold text-lg text-gray-800 truncate">${book.title}</h3>
                        <p class="text-gray-500 text-sm mb-4">от ${book.author}</p>
                        <div class="flex items-center justify-between mt-auto">
                            <span class="px-3 py-1 bg-blue-50 text-blue-600 text-xs font-bold rounded-full uppercase">
                                ${book.category || 'Общи'}
                            </span>
                            ${book.link ? `
                                <a href="${book.link}" target="_blank" class="text-blue-600 hover:underline font-semibold text-sm">
                                    Отвори <i class="fas fa-external-link-alt ml-1"></i>
                                </a>
                            ` : ''}
                        </div>
                    </div>
                `).join('');
            }
        }

        // Търсене и филтри
        searchInput.oninput = renderBooks;
        categoryFilter.onchange = renderBooks;

        // Добавяне на книга
        addBookForm.onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-circle-notch animate-spin"></i> Запазване...';

            const formData = new FormData(addBookForm);
            try {
                await addDoc(booksCol, {
                    title: formData.get('title'),
                    author: formData.get('author'),
                    category: formData.get('category'),
                    year: formData.get('year'),
                    link: formData.get('link'),
                    timestamp: new Date()
                });
                toggleModal('addBookModal');
                addBookForm.reset();
            } catch (e) {
                alert("Грешка при запис: " + e.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-save mr-2"></i>Запази книгата';
            }
        };

        // Изтриване
        window.deleteBook = async (id) => {
            if(confirm("Сигурни ли сте, че искате да премахнете тази книга?")) {
                await deleteDoc(doc(db, "books", id));
            }
        };

        // Глобални UI функции
        window.toggleModal = (id) => {
            const modal = document.getElementById(id);
            modal.classList.toggle('hidden');
        };
    </script>

</body>
</html>
