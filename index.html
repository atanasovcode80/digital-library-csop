<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дигитална Библиотека | ЦСОП</title>
    <!-- Tailwind CSS за модерен дизайн -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome за икони -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap');
        
        body { 
            font-family: 'Montserrat', sans-serif; 
            background-color: #f1f5f9;
        }

        .book-card {
            transition: all 0.3s ease;
            border-radius: 1.5rem;
        }

        .book-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .gradient-header {
            background: linear-gradient(135deg, #1d4ed8 0%, #3b82f6 100%);
        }

        .loader-spin {
            border-top-color: #3b82f6;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .modal-show {
            display: flex !important;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- Хедър -->
    <header class="gradient-header text-white shadow-xl p-6 mb-8">
        <div class="container mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center space-x-4">
                <div class="bg-white/20 p-3 rounded-2xl backdrop-blur-md">
                    <i class="fas fa-book text-3xl text-white"></i>
                </div>
                <div>
                    <h1 class="text-2xl md:text-3xl font-bold tracking-tight">Библиотека ЦСОП</h1>
                    <p class="text-blue-100 text-sm font-medium">Дигитални ресурси и книги</p>
                </div>
            </div>
            <button id="openModalBtn" class="bg-white text-blue-700 font-bold py-3 px-8 rounded-2xl shadow-lg hover:bg-blue-50 transition active:scale-95 flex items-center gap-2">
                <i class="fas fa-plus-circle"></i> Добави Книга
            </button>
        </div>
    </header>

    <main class="container mx-auto px-4 flex-grow pb-12">
        
        <!-- Модална форма за добавяне -->
        <div id="addBookModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 hidden items-center justify-center p-4">
            <div class="bg-white rounded-[2rem] shadow-2xl w-full max-w-md overflow-hidden animate-in fade-in zoom-in duration-300">
                <div class="bg-blue-600 p-6 text-white flex justify-between items-center">
                    <h2 class="text-xl font-bold">Нова книга</h2>
                    <button id="closeModalBtn" class="text-white/80 hover:text-white transition">
                        <i class="fas fa-times text-2xl"></i>
                    </button>
                </div>
                <div class="p-8 space-y-5">
                    <div>
                        <label class="block text-gray-700 text-sm font-bold mb-2">Заглавие</label>
                        <input type="text" id="titleInput" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="Пример: Под игото">
                    </div>
                    <div>
                        <label class="block text-gray-700 text-sm font-bold mb-2">Автор</label>
                        <input type="text" id="authorInput" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="Пример: Иван Вазов">
                    </div>
                    <div>
                        <label class="block text-gray-700 text-sm font-bold mb-2">Линк към корица (URL)</label>
                        <input type="text" id="coverInput" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="https://example.com/image.jpg">
                    </div>
                    <button id="saveBookBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-lg transition duration-300">
                        Запази в каталога
                    </button>
                </div>
            </div>
        </div>

        <!-- Индикатор за зареждане -->
        <div id="loadingIndicator" class="flex flex-col items-center justify-center py-24">
            <div class="loader-spin rounded-full border-4 border-gray-200 h-14 w-14 mb-4"></div>
            <p class="text-gray-500 font-semibold italic">Свързване с библиотеката...</p>
        </div>

        <!-- Мрежа с книги -->
        <div id="booksGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
            <!-- Книгите ще се заредят тук динамично -->
        </div>

        <!-- Празно състояние -->
        <div id="emptyState" class="hidden text-center py-20 bg-white rounded-3xl border-2 border-dashed border-gray-200">
            <i class="fas fa-folder-open text-6xl text-gray-200 mb-6"></i>
            <h3 class="text-xl font-bold text-gray-400">Библиотеката е празна</h3>
            <p class="text-gray-400 mt-2">Добавете първата книга, за да започнете.</p>
        </div>
    </main>

    <!-- Футър -->
    <footer class="bg-white border-t border-gray-100 py-10 text-center text-gray-400 text-sm">
        <div class="container mx-auto">
            <p class="font-bold text-gray-500 mb-2">ЦСОП „Леда Милева“</p>
            <p>&copy; 2024 Дигитална Библиотека. Всички права запазени.</p>
        </div>
    </footer>

    <!-- Firebase SDK (Modular) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        // Твоята Firebase конфигурация
        const firebaseConfig = {
            apiKey: "AIzaSyDMUx2UvYY26wU5WZ33Cy6S--Rwl2ZOUcY",
            authDomain: "digital-library-csop.firebaseapp.com",
            projectId: "digital-library-csop",
            storageBucket: "digital-library-csop.firebasestorage.app",
            messagingSenderId: "277590147002",
            appId: "1:277590147002:web:1b179531c66cef742e2783"
        };

        // Инициализиране
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const booksRef = collection(db, "books");

        // UI Елементи
        const booksGrid = document.getElementById('booksGrid');
        const loadingIndicator = document.getElementById('loadingIndicator');
        const emptyState = document.getElementById('emptyState');
        const bookModal = document.getElementById('addBookModal');

        // Контрол на модала
        document.getElementById('openModalBtn').onclick = () => bookModal.classList.add('modal-show');
        document.getElementById('closeModalBtn').onclick = () => bookModal.classList.remove('modal-show');
        
        // Затваряне при клик извън формата
        window.onclick = (e) => {
            if (e.target == bookModal) bookModal.classList.remove('modal-show');
        };

        // Запазване на нова книга
        document.getElementById('saveBookBtn').onclick = async () => {
            const title = document.getElementById('titleInput').value.trim();
            const author = document.getElementById('authorInput').value.trim();
            const cover = document.getElementById('coverInput').value.trim() || 'https://images.unsplash.com/photo-1543005120-a1bb3ea0b6cb?w=600';

            if (!title || !author) {
                alert("Моля, попълнете заглавие и автор!");
                return;
            }

            try {
                await addDoc(booksRef, {
                    title: title,
                    author: author,
                    cover: cover,
                    createdAt: serverTimestamp()
                });
                
                // Изчистване и затваряне
                document.getElementById('titleInput').value = '';
                document.getElementById('authorInput').value = '';
                document.getElementById('coverInput').value = '';
                bookModal.classList.remove('modal-show');
            } catch (err) {
                console.error("Грешка при запис:", err);
                alert("Неуспешно записване. Проверете Firestore Rules.");
            }
        };

        // Слушане за данни в реално време
        const q = query(booksRef, orderBy("createdAt", "desc"));
        onSnapshot(q, (snapshot) => {
            loadingIndicator.style.display = 'none';
            booksGrid.innerHTML = '';
            
            if (snapshot.empty) {
                emptyState.classList.remove('hidden');
                return;
            }

            emptyState.classList.add('hidden');
            snapshot.forEach((bookDoc) => {
                const data = bookDoc.data();
                const bookCard = document.createElement('div');
                bookCard.className = "book-card bg-white overflow-hidden shadow-sm border border-gray-100 flex flex-col h-full";
                
                bookCard.innerHTML = `
                    <div class="relative h-64 overflow-hidden group">
                        <img src="${data.cover}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" onerror="this.src='https://images.unsplash.com/photo-1543005120-a1bb3ea0b6cb?w=600'">
                        <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                            <button onclick="window.deleteBook('${bookDoc.id}')" class="bg-red-500 text-white p-4 rounded-full hover:bg-red-600 transition shadow-xl">
                                <i class="fas fa-trash-alt text-lg"></i>
                            </button>
                        </div>
                    </div>
                    <div class="p-6 flex-grow">
                        <h3 class="font-bold text-xl text-gray-800 leading-tight mb-2">${data.title}</h3>
                        <p class="text-blue-600 font-bold text-sm uppercase tracking-widest">${data.author}</p>
                    </div>
                `;
                booksGrid.appendChild(bookCard);
            });
        });

        // Функция за изтриване
        window.deleteBook = async (id) => {
            if (confirm("Сигурни ли сте, че искате да премахнете тази книга?")) {
                try {
                    await deleteDoc(doc(db, "books", id));
                } catch (e) {
                    alert("Грешка при изтриване!");
                }
            }
        };

    </script>
</body>
</html>
