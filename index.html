<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дигитална библиотека - ЦСОП "Леда Милева"</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap');
        body { font-family: 'Manrope', sans-serif; -webkit-font-smoothing: antialiased; }
        .animate-pulse-slow { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-[#F8FAFC]">
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, addDoc, updateDoc, deleteDoc, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'csop-lm-library';

        window.fb = { db, auth, appId, collection, doc, setDoc, addDoc, updateDoc, deleteDoc, onSnapshot, query, signInWithCustomToken, signInAnonymously, onAuthStateChanged };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback } = React;

        const MAIN_CATEGORIES = {
            therapy: { id: 'therapy', name: 'Терапия', icon: 'stethoscope', color: 'from-teal-600 to-emerald-600', bg: 'bg-teal-600' },
            education: { id: 'education', name: 'Обучение', icon: 'graduation-cap', color: 'from-orange-500 to-amber-500', bg: 'bg-orange-500' }
        };

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        function App() {
            const [state, setState] = useState({
                subfolders: [],
                resources: [],
                loading: true,
                user: null,
                role: null,
                currentView: 'home',
                activeCategory: null,
                activeSubfolder: null
            });

            const [search, setSearch] = useState('');
            const [passwordModal, setPasswordModal] = useState({ open: false, value: '' });
            const [editModal, setEditModal] = useState({ type: null, data: null, open: false });

            // Оптимизирана инициализация
            useEffect(() => {
                const init = async () => {
                    const checkFb = setInterval(async () => {
                        if (window.fb) {
                            clearInterval(checkFb);
                            try {
                                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                                    await fb.signInWithCustomToken(fb.auth, __initial_auth_token);
                                } else {
                                    await fb.signInAnonymously(fb.auth);
                                }
                                
                                fb.onAuthStateChanged(fb.auth, (u) => {
                                    setState(prev => ({ ...prev, user: u }));
                                    if (u) startSync();
                                });
                            } catch (e) { console.error(e); }
                        }
                    }, 50);
                };
                init();
            }, []);

            const startSync = useCallback(() => {
                const qSubs = fb.collection(fb.db, 'artifacts', fb.appId, 'public', 'data', 'subfolders');
                const qRes = fb.collection(fb.db, 'artifacts', fb.appId, 'public', 'data', 'resources');

                const unsubSubs = fb.onSnapshot(qSubs, (s) => {
                    const data = s.docs.map(d => ({ id: d.id, ...d.data() }));
                    setState(prev => ({ ...prev, subfolders: data, loading: false }));
                });

                const unsubRes = fb.onSnapshot(qRes, (s) => {
                    const data = s.docs.map(d => ({ id: d.id, ...d.data() }));
                    setState(prev => ({ ...prev, resources: data }));
                });

                return () => { unsubSubs(); unsubRes(); };
            }, []);

            const handleLogin = (e) => {
                e.preventDefault();
                if (passwordModal.value === '1500510') setState(p => ({...p, role: 'admin'}));
                else if (passwordModal.value === 'As800224@') setState(p => ({...p, role: 'supervisor'}));
                else return;
                setPasswordModal({ open: false, value: '' });
            };

            const filteredResources = useMemo(() => {
                if (!search.trim()) return [];
                return state.resources.filter(r => 
                    r.title?.toLowerCase().includes(search.toLowerCase()) || 
                    r.description?.toLowerCase().includes(search.toLowerCase())
                );
            }, [search, state.resources]);

            if (state.loading) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-white">
                        <div className="flex flex-col items-center gap-4">
                            <div className="w-12 h-12 border-4 border-teal-600 border-t-transparent rounded-full animate-spin"></div>
                            <p className="text-[10px] font-black uppercase tracking-widest text-slate-400">Синхронизиране...</p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex flex-col min-h-screen">
                    <header className="bg-slate-900 text-white p-4 sticky top-0 z-50 shadow-2xl">
                        <div className="max-w-6xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
                            <div className="flex items-center gap-3 cursor-pointer" onClick={() => setState(p => ({...p, currentView: 'home', activeCategory: null, activeSubfolder: null}))}>
                                <div className="bg-teal-500 p-2 rounded-xl"><Icon name="book-open" size={24} /></div>
                                <div>
                                    <h1 className="font-black uppercase text-sm tracking-tight">Библиотека</h1>
                                    <p className="text-[8px] font-bold opacity-50 tracking-widest uppercase">ЦСОП "Леда Милева"</p>
                                </div>
                            </div>

                            <div className="relative w-full max-w-md">
                                <Icon name="search" size={16} className="absolute left-4 top-1/2 -translate-y-1/2 opacity-30" />
                                <input 
                                    type="text" 
                                    placeholder="Бързо търсене в архива..." 
                                    className="w-full bg-white/10 border border-white/10 rounded-2xl py-2.5 pl-11 pr-4 text-sm focus:bg-white/20 outline-none transition-all"
                                    value={search}
                                    onChange={(e) => setSearch(e.target.value)}
                                />
                            </div>

                            <button 
                                onClick={() => state.role ? setState(p => ({...p, role: null})) : setPasswordModal({open: true, value: ''})}
                                className="px-5 py-2.5 bg-white text-slate-900 rounded-xl text-[10px] font-black uppercase hover:bg-teal-500 hover:text-white transition-all"
                            >
                                {state.role ? `Изход (${state.role})` : 'Вход'}
                            </button>
                        </div>
                    </header>

                    <main className="flex-grow max-w-6xl mx-auto w-full p-6">
                        {search.trim() ? (
                            <div className="fade-in space-y-4">
                                <h2 className="text-xl font-black uppercase text-slate-800 border-b pb-4">Резултати ({filteredResources.length})</h2>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    {filteredResources.map(res => (
                                        <div key={res.id} className="bg-white p-5 rounded-2xl border border-slate-100 flex items-center justify-between shadow-sm">
                                            <div className="flex items-center gap-4">
                                                <div className="bg-slate-50 p-3 rounded-xl text-slate-400"><Icon name={res.type === 'file' ? 'file-text' : 'link'} /></div>
                                                <h4 className="font-bold text-slate-700">{res.title}</h4>
                                            </div>
                                            <a href={res.url} target="_blank" className="bg-slate-900 text-white px-4 py-2 rounded-lg text-[10px] font-black uppercase">Виж</a>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ) : (
                            <>
                                {state.currentView === 'home' && (
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8 py-10 fade-in">
                                        {Object.values(MAIN_CATEGORIES).map(cat => (
                                            <div 
                                                key={cat.id} 
                                                onClick={() => setState(p => ({...p, currentView: 'category', activeCategory: cat}))}
                                                className={`group relative overflow-hidden h-64 rounded-[40px] bg-gradient-to-br ${cat.color} p-10 text-white cursor-pointer shadow-xl hover:shadow-2xl transition-all hover:-translate-y-1`}
                                            >
                                                <Icon name={cat.icon} size={48} className="opacity-20 absolute -right-4 -bottom-4 transform -rotate-12 group-hover:scale-110 transition-transform" />
                                                <h2 className="text-4xl font-black uppercase tracking-tighter mb-2">{cat.name}</h2>
                                                <p className="text-[10px] font-black uppercase tracking-[0.3em] opacity-80">
                                                    {state.subfolders.filter(s => s.parentId === cat.id).length} Раздела
                                                </p>
                                                <div className="absolute bottom-10 left-10 w-12 h-1 bg-white/30 rounded-full group-hover:w-24 transition-all"></div>
                                            </div>
                                        ))}
                                    </div>
                                )}

                                {state.currentView === 'category' && (
                                    <div className="fade-in space-y-6">
                                        <button onClick={() => setState(p => ({...p, currentView: 'home'}))} className="text-[10px] font-black uppercase text-slate-400 flex items-center gap-2 hover:text-teal-600">
                                            <Icon name="chevron-left" size={14} /> Обратно
                                        </button>
                                        <h2 className="text-3xl font-black uppercase text-slate-900 tracking-tighter">{state.activeCategory.name}</h2>
                                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                            {state.subfolders.filter(s => s.parentId === state.activeCategory.id).map(f => (
                                                <div 
                                                    key={f.id} 
                                                    onClick={() => setState(p => ({...p, currentView: 'subfolder', activeSubfolder: f}))}
                                                    className="bg-white p-6 rounded-3xl border border-slate-100 hover:border-teal-500 cursor-pointer shadow-sm hover:shadow-md transition-all group"
                                                >
                                                    <div className="bg-slate-50 w-12 h-12 rounded-2xl flex items-center justify-center text-slate-300 group-hover:text-teal-500 transition-colors mb-4">
                                                        <Icon name="folder" size={24} />
                                                    </div>
                                                    <h3 className="font-black uppercase text-sm text-slate-800">{f.name}</h3>
                                                    <p className="text-[9px] font-bold text-slate-400 mt-2">
                                                        {state.resources.filter(r => r.subfolderIds?.includes(f.id)).length} ресурса
                                                    </p>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {state.currentView === 'subfolder' && (
                                    <div className="fade-in space-y-4">
                                        <button onClick={() => setState(p => ({...p, currentView: 'category'}))} className="text-[10px] font-black uppercase text-slate-400 flex items-center gap-2">
                                            <Icon name="chevron-left" size={14} /> Назад
                                        </button>
                                        <div className="flex items-center justify-between bg-white p-8 rounded-[30px] border border-slate-100 border-l-8 border-l-teal-500 shadow-sm">
                                            <h2 className="text-2xl font-black uppercase text-slate-900">{state.activeSubfolder.name}</h2>
                                        </div>
                                        <div className="grid gap-3 pt-4">
                                            {state.resources.filter(r => r.subfolderIds?.includes(state.activeSubfolder.id)).map(res => (
                                                <div key={res.id} className="bg-white p-5 rounded-2xl border border-slate-100 flex flex-col sm:flex-row sm:items-center justify-between gap-4 hover:shadow-md transition-all">
                                                    <div className="flex items-center gap-4">
                                                        <div className="bg-slate-50 p-3 rounded-xl text-slate-400"><Icon name={res.type === 'file' ? 'file-text' : 'link'} /></div>
                                                        <div>
                                                            <h4 className="font-black text-slate-800">{res.title}</h4>
                                                            <p className="text-[10px] text-slate-400">{res.description}</p>
                                                        </div>
                                                    </div>
                                                    <a href={res.url} target="_blank" className="bg-teal-600 text-white px-8 py-3 rounded-xl text-[10px] font-black uppercase text-center hover:bg-slate-900 transition-all">Отвори</a>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </>
                        )}
                    </main>

                    <footer className="bg-white border-t border-slate-200 py-10">
                        <div className="max-w-6xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-6">
                            <div className="text-center md:text-left">
                                <p className="font-black text-slate-900 uppercase text-xs">ЦСОП "Леда Милева"</p>
                                <p className="text-[9px] font-bold text-slate-400 uppercase tracking-widest mt-1">Всички права запазени © 2024</p>
                            </div>
                            <div className="flex gap-4">
                                <a href="mailto:info-1500510@edu.mon.bg" className="bg-slate-50 p-3 rounded-xl text-slate-400 hover:text-teal-600 transition-colors"><Icon name="mail" size={18} /></a>
                                <a href="https://csop-lm.eu" target="_blank" className="bg-slate-50 p-3 rounded-xl text-slate-400 hover:text-teal-600 transition-colors"><Icon name="globe" size={18} /></a>
                            </div>
                        </div>
                    </footer>

                    {passwordModal.open && (
                        <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-md z-[100] flex items-center justify-center p-4">
                            <form onSubmit={handleLogin} className="bg-white p-10 rounded-[40px] w-full max-w-sm shadow-2xl space-y-6">
                                <h3 className="text-xl font-black uppercase text-center text-slate-800">Вход</h3>
                                <input 
                                    type="password" 
                                    autoFocus
                                    className="w-full bg-slate-50 border border-slate-100 p-5 rounded-2xl outline-none text-center text-2xl font-black tracking-[0.5em]"
                                    value={passwordModal.value}
                                    onChange={e => setPasswordModal(p => ({...p, value: e.target.value}))}
                                    placeholder="••••"
                                />
                                <button className="w-full bg-slate-900 text-white py-5 rounded-2xl font-black uppercase text-[10px]">Продължи</button>
                                <button type="button" onClick={() => setPasswordModal({open: false, value: ''})} className="w-full text-[9px] font-black uppercase text-slate-400">Отказ</button>
                            </form>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
