<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дигитална библиотека на ЦСОП "Леда Милева"</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800;900&display=swap');
        body { font-family: 'Manrope', sans-serif; background-color: #F8FAFC; color: #0F172A; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        
        .animate-fade-in { animation: fadeIn 0.4s ease-out; }
        .animate-slide-up { animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        .animate-pop { animation: popIn 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes popIn { 
            0% { opacity: 0; transform: scale(0.95); } 
            100% { opacity: 1; transform: scale(1); } 
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc, query } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";

        const { useState, useEffect, useMemo } = React;

        // Конфигурация
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'csop-library';

        const Icons = {
            Search: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>,
            Filter: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="4" y1="21" x2="4" y2="14"></line><line x1="4" y1="10" x2="4" y2="3"></line><line x1="12" y1="21" x2="12" y2="12"></line><line x1="12" y1="8" x2="12" y2="3"></line><line x1="20" y1="21" x2="20" y2="16"></line><line x1="20" y1="12" x2="20" y2="3"></line></svg>,
            Lock: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>,
            Plus: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>,
            X: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>,
            FileText: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
        };

        const MAIN_CATEGORIES = ["Обучение", "Терапия"];
        const FORMAT_LABELS = { pdf: "PDF", docx: "Word", ppt: "PPT", video: "Видео", game: "Игра" };

        function App() {
            const [resources, setResources] = useState([]);
            const [user, setUser] = useState(null);
            const [isLoading, setIsLoading] = useState(true);
            const [isAdmin, setIsAdmin] = useState(false);
            const [showLogin, setShowLogin] = useState(false);
            const [showAdd, setShowAdd] = useState(false);
            const [search, setSearch] = useState("");
            const [cat, setCat] = useState("Всички");
            const [pass, setPass] = useState("");
            
            const [form, setForm] = useState({ title: "", category: "Обучение", format: "pdf", grade: "1-4", url: "" });

            // 1. Auth Init
            useEffect(() => {
                const init = async () => {
                    try {
                        await signInAnonymously(auth);
                    } catch (e) { console.error(e); }
                };
                init();
                return onAuthStateChanged(auth, setUser);
            }, []);

            // 2. Data Listener
            useEffect(() => {
                if (!user) return;
                const q = collection(db, 'artifacts', appId, 'public', 'data', 'resources');
                const unsub = onSnapshot(q, (snap) => {
                    setResources(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                    setIsLoading(false);
                }, (err) => { 
                    console.error("Грешка при зареждане:", err);
                    setIsLoading(false); 
                });
                return unsub;
            }, [user]);

            // 3. Esc Key
            useEffect(() => {
                const handleEsc = (e) => {
                    if (e.key === 'Escape') {
                        setShowLogin(false);
                        setShowAdd(false);
                    }
                };
                window.addEventListener('keydown', handleEsc);
                return () => window.removeEventListener('keydown', handleEsc);
            }, []);

            const handleSave = async (e) => {
                e.preventDefault();
                if (!user) return;
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'resources'), {
                        ...form, createdAt: Date.now()
                    });
                    setShowAdd(false);
                    setForm({ title: "", category: "Обучение", format: "pdf", grade: "1-4", url: "" });
                } catch (e) { alert("Грешка при запис"); }
            };

            const handleDelete = async (id) => {
                if (!confirm("Изтриване?")) return;
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'resources', id));
            };

            const filtered = resources.filter(r => 
                r.title.toLowerCase().includes(search.toLowerCase()) &&
                (cat === "Всички" || r.category === cat)
            );

            return (
                <div className="min-h-screen flex flex-col">
                    <header className="fixed top-0 w-full z-40 glass-panel shadow-sm h-20 flex items-center px-6 justify-between">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-teal-600 rounded-xl flex items-center justify-center text-white font-black">ЛМ</div>
                            <h1 className="font-black uppercase text-sm tracking-tight hidden sm:block">Библиотека ЦСОП</h1>
                        </div>
                        <div className="flex gap-3">
                            {isAdmin ? (
                                <>
                                    <button onClick={() => setShowAdd(true)} className="bg-teal-600 text-white px-4 py-2 rounded-full text-xs font-black uppercase flex items-center gap-2">
                                        <Icons.Plus /> Добави
                                    </button>
                                    <button onClick={() => setIsAdmin(false)} className="bg-slate-800 text-white px-4 py-2 rounded-full text-xs font-black uppercase">Изход</button>
                                </>
                            ) : (
                                <button onClick={() => setShowLogin(true)} className="bg-slate-900 text-white px-4 py-2 rounded-full text-xs font-black uppercase flex items-center gap-2">
                                    <Icons.Lock /> Учител
                                </button>
                            )}
                        </div>
                    </header>

                    <main className="pt-32 pb-20 px-6 max-w-6xl mx-auto w-full flex-grow">
                        <div className="text-center mb-12">
                            <h2 className="text-4xl font-black mb-4 uppercase tracking-tighter">Дигитални <span className="text-teal-600">Ресурси</span></h2>
                            <p className="text-slate-500 font-bold">Специализирана база данни за Обучение и Терапия</p>
                        </div>

                        <div className="flex flex-col md:flex-row gap-4 mb-8">
                            <div className="relative flex-grow">
                                <span className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"><Icons.Search /></span>
                                <input 
                                    type="text" 
                                    placeholder="Търсене..." 
                                    className="w-full pl-12 pr-6 py-4 rounded-2xl border-2 border-slate-100 focus:border-teal-500 outline-none font-bold"
                                    value={search}
                                    onChange={e => setSearch(e.target.value)}
                                />
                            </div>
                            <div className="flex gap-2">
                                {["Всички", ...MAIN_CATEGORIES].map(c => (
                                    <button 
                                        key={c}
                                        onClick={() => setCat(c)}
                                        className={`px-6 py-4 rounded-2xl font-black uppercase text-xs tracking-wider transition-all ${cat === c ? 'bg-slate-900 text-white' : 'bg-white border-2 border-slate-100 text-slate-500'}`}
                                    >
                                        {c}
                                    </button>
                                ))}
                            </div>
                        </div>

                        {isLoading ? (
                            <div className="text-center py-20 font-black text-slate-300 uppercase animate-pulse">Зареждане...</div>
                        ) : (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                {filtered.map(r => (
                                    <div key={r.id} className="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-xl shadow-slate-100/50 hover:-translate-y-1 transition-all">
                                        <div className="flex justify-between items-start mb-4">
                                            <span className="bg-teal-50 text-teal-600 px-3 py-1 rounded-lg text-[10px] font-black uppercase">{FORMAT_LABELS[r.format]}</span>
                                            <span className="text-[10px] font-black text-slate-400 uppercase">{r.grade} клас</span>
                                        </div>
                                        <h3 className="font-black text-lg mb-2 leading-tight">{r.title}</h3>
                                        <p className="text-slate-400 text-xs font-bold mb-6">{r.category}</p>
                                        <div className="flex justify-between items-center border-t pt-4">
                                            <a href={r.url} target="_blank" className="font-black text-xs uppercase text-teal-600 hover:underline">Отвори</a>
                                            {isAdmin && <button onClick={() => handleDelete(r.id)} className="text-red-400 hover:text-red-600 font-bold text-xs uppercase">Изтрий</button>}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    {/* Модал Вход */}
                    {showLogin && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 animate-fade-in" onClick={e => e.target === e.currentTarget && setShowLogin(false)}>
                            <div className="bg-white p-8 rounded-[2rem] w-full max-w-sm animate-pop">
                                <h3 className="text-2xl font-black mb-6 text-center">ВХОД</h3>
                                <input 
                                    type="password" 
                                    placeholder="Парола..." 
                                    className="w-full p-4 bg-slate-50 rounded-2xl border-2 border-slate-100 mb-4 text-center font-bold"
                                    value={pass}
                                    onChange={e => setPass(e.target.value)}
                                    autoFocus
                                />
                                <button 
                                    onClick={() => { if(pass === "admin123") { setIsAdmin(true); setShowLogin(false); setPass(""); } else alert("Грешна парола"); }}
                                    className="w-full bg-slate-900 text-white py-4 rounded-2xl font-black uppercase"
                                >
                                    Влез
                                </button>
                            </div>
                        </div>
                    )}

                    {/* Модал Добавяне */}
                    {showAdd && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 animate-fade-in" onClick={e => e.target === e.currentTarget && setShowAdd(false)}>
                            <div className="bg-white p-8 rounded-[2rem] w-full max-w-md animate-pop">
                                <h3 className="text-2xl font-black mb-6">НОВ РЕСУРС</h3>
                                <form onSubmit={handleSave} className="flex flex-col gap-4">
                                    <input required placeholder="Заглавие..." className="p-4 bg-slate-50 rounded-xl border-2 border-slate-100 font-bold" onChange={e => setForm({...form, title: e.target.value})} />
                                    <div className="grid grid-cols-2 gap-2">
                                        <select className="p-4 bg-slate-50 rounded-xl font-bold text-xs" onChange={e => setForm({...form, category: e.target.value})}>
                                            {MAIN_CATEGORIES.map(c => <option key={c}>{c}</option>)}
                                        </select>
                                        <select className="p-4 bg-slate-50 rounded-xl font-bold text-xs" onChange={e => setForm({...form, format: e.target.value})}>
                                            {Object.keys(FORMAT_LABELS).map(k => <option key={k} value={k}>{FORMAT_LABELS[k]}</option>)}
                                        </select>
                                    </div>
                                    <select className="p-4 bg-slate-50 rounded-xl font-bold text-xs" onChange={e => setForm({...form, grade: e.target.value})}>
                                        <option value="1-4">1-4 клас</option>
                                        <option value="5-7">5-7 клас</option>
                                        <option value="8-10">8-10 клас</option>
                                        <option value="11-12">11-12 клас</option>
                                    </select>
                                    <input required type="url" placeholder="URL линк..." className="p-4 bg-slate-50 rounded-xl border-2 border-slate-100 font-bold" onChange={e => setForm({...form, url: e.target.value})} />
                                    <button className="bg-teal-600 text-white py-4 rounded-xl font-black uppercase mt-4">Запази</button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
